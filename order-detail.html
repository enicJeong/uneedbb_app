<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주문 상세 — bb</title>
<link rel="stylesheet" href="style.css">
<style>
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { background: #f9fafb; padding: 7px 10px; text-align: left; font-size: 12px; color: #6b7280; border-bottom: 1px solid #e5e7eb; }
  td { padding: 8px 10px; border-bottom: 1px solid #f3f4f6; }

  /* 상품 배지 */
  .item-badge {
    display: inline-flex; align-items: center; gap: 3px;
    padding: 3px 10px; border-radius: 6px;
    font-size: 13px; font-weight: 700; white-space: nowrap;
  }
  .item-badge .qty-chip {
    color: #fff; border-radius: 4px; padding: 0 5px;
    font-size: 11px; font-weight: 700; line-height: 18px;
  }

  /* 입금 연결 */
  .txn-link-row { display: flex; align-items: center; gap: 8px; padding: 6px 0;
    border-bottom: 1px solid #f3f4f6; font-size: 13px; }
  .txn-link-row:last-child { border-bottom: none; }
  .txn-link-date { font-size: 11px; color: #9ca3af; white-space: nowrap; }
  .txn-link-memo { flex: 1; font-weight: 600; }
  .txn-link-amt  { color: #15803d; font-weight: 700; white-space: nowrap; }
  .txn-link-del  { background: none; border: none; color: #fca5a5; cursor: pointer; font-size: 14px; padding: 0 2px; }
  .txn-link-del:hover { color: #dc2626; }
  .txn-search-row { display: flex; gap: 6px; margin-top: 10px; }
  .txn-search-row input { flex: 1; padding: 7px 10px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 13px; }
  .txn-search-row input:focus { outline: none; border-color: #2563eb; }
  .txn-result { border: 1px solid #e5e7eb; border-radius: 8px; margin-top: 6px;
    max-height: 180px; overflow-y: auto; display: none; }
  .txn-result-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px;
    border-bottom: 1px solid #f3f4f6; cursor: pointer; font-size: 13px; }
  .txn-result-item:last-child { border-bottom: none; }
  .txn-result-item:hover { background: #f9fafb; }
  .txn-result-date { font-size: 11px; color: #9ca3af; white-space: nowrap; }
  .txn-result-memo { flex: 1; font-weight: 600; }
  .txn-result-amt  { color: #15803d; font-weight: 700; white-space: nowrap; }
  .txn-link-form { margin-top: 8px; display: flex; gap: 6px; align-items: center;
    padding: 8px 10px; background: #f0fdf4; border-radius: 8px; display: none; font-size: 13px; }
  .txn-link-form input { width: 120px; padding: 5px 8px; border: 1px solid #d1d5db;
    border-radius: 6px; font-size: 13px; text-align: right; }

  /* SMS 토글 */
  .sms-toggle-wrap { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #6b7280; }
  .sms-toggle-wrap.on { color: #2563eb; }
  .toggle-switch { position: relative; width: 36px; height: 20px; cursor: pointer; }
  .toggle-switch input { opacity: 0; width: 0; height: 0; }
  .toggle-track { position: absolute; inset: 0; background: #d1d5db; border-radius: 99px; transition: background .2s; }
  .toggle-thumb { position: absolute; top: 3px; left: 3px; width: 14px; height: 14px;
    background: #fff; border-radius: 50%; transition: transform .2s; }
  .toggle-switch input:checked ~ .toggle-track { background: #2563eb; }
  .toggle-switch input:checked ~ .toggle-thumb { transform: translateX(16px); }
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <button class="btn-back" onclick="history.back()">←</button>
    <h1 id="page-title">주문 상세</h1>
  </div>

  <!-- 상태 흐름 -->
  <div class="card">
    <h2>진행 상태</h2>
    <div class="status-flow" id="status-flow"></div>
    <div id="payment-status-wrap" style="display:none;margin-top:8px">
      <span class="badge" style="background:#d1fae5;color:#065f46;border:1px solid #6ee7b7;padding:4px 14px;font-size:12px">💰 수금완료</span>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:16px;flex-wrap:wrap;gap:8px">
      <div class="btn-row" id="status-btns"></div>
      <label class="sms-toggle-wrap" id="sms-toggle-wrap" title="주문확정 시 문자 발송 여부">
        <label class="toggle-switch">
          <input type="checkbox" id="sms-toggle">
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </label>
        <span id="sms-toggle-label">문자 OFF</span>
      </label>
    </div>
  </div>

  <!-- 주문 정보 -->
  <div class="card">
    <h2>주문 정보</h2>
    <div class="info-row"><span class="info-label">주문번호</span><span class="info-value" id="d-order-no"></span></div>
    <div class="info-row"><span class="info-label">접수일시</span><span class="info-value" id="d-date"></span></div>
    <div class="info-row"><span class="info-label">주문자</span><span class="info-value" id="d-orderer"></span></div>
    <div class="info-row"><span class="info-label">수령자</span><span class="info-value" id="d-recipient"></span></div>
    <div class="info-row"><span class="info-label">배송방법</span><span class="info-value" id="d-delivery"></span></div>
    <div class="info-row"><span class="info-label">주소</span><span class="info-value" id="d-address"></span></div>
    <div class="info-row"><span class="info-label">우선순위</span><span class="info-value" id="d-priority"></span></div>
    <div class="info-row"><span class="info-label">주문서</span><span class="info-value" id="d-printed"></span></div>
    <div class="info-row"><span class="info-label">메모</span><span class="info-value" id="d-memo"></span></div>
  </div>

  <!-- 상품 -->
  <div class="card">
    <h2>상품</h2>
    <table>
      <thead><tr><th>상품</th><th>단가</th><th>수량</th><th>소계</th></tr></thead>
      <tbody id="d-items"></tbody>
    </table>
    <div class="amount-box" style="margin-top:12px">
      <div class="amount-row"><span>상품금액</span><span id="d-sum-items"></span></div>
      <div class="amount-row"><span>택배비</span><span id="d-shipping"></span></div>
      <div class="amount-row total"><span>청구금액</span><span id="d-total"></span></div>
    </div>
  </div>

  <!-- 송장번호 -->
  <div class="card" id="tracking-card">
    <h2>송장번호</h2>
    <div class="tracking-add">
      <input type="text" id="tracking-input" placeholder="송장번호 입력">
      <button class="btn btn-primary" id="btn-save-tracking">저장</button>
      <a id="btn-track-link" href="#" target="_blank" class="btn" style="display:none;background:#eff6ff;color:#2563eb;border:1px solid #bfdbfe;text-decoration:none">택배조회</a>
    </div>
  </div>

  <!-- 입금 연결 -->
  <div class="card" id="txn-card">
    <h2>입금 연결</h2>
    <div class="toggle-row" style="margin-bottom:12px">
      <button class="toggle-btn active" id="tab-transfer">이체</button>
      <button class="toggle-btn" id="tab-cash">현금</button>
    </div>

    <!-- 합계 (공통) -->
    <div id="txn-linked-total" style="display:none;margin-bottom:10px;padding:8px 10px;border-radius:7px;font-size:13px;font-weight:700"></div>

    <!-- 이체 탭 -->
    <div id="panel-transfer">
      <div id="txn-links-list"><div style="color:#9ca3af;font-size:13px">연결된 입금 없음</div></div>
      <div class="txn-search-row" style="margin-top:10px">
        <input type="text" id="txn-search-input" placeholder="거래 검색 (이름·금액·날짜)">
        <button class="btn btn-outline" id="btn-txn-search">검색</button>
      </div>
      <div class="txn-result" id="txn-result"></div>
      <div class="txn-link-form" id="txn-link-form">
        <span id="txn-selected-label" style="flex:1;font-weight:600"></span>
        <input type="number" id="txn-link-amount" placeholder="배분금액">원
        <button class="btn btn-success" id="btn-txn-link-confirm" style="font-size:12px;padding:5px 12px">연결</button>
        <button class="btn btn-outline" id="btn-txn-link-cancel" style="font-size:12px;padding:5px 10px">취소</button>
      </div>
    </div>

    <!-- 현금 탭 -->
    <div id="panel-cash" style="display:none">
      <div id="cash-list"><div style="color:#9ca3af;font-size:13px">현금 입금 없음</div></div>
      <div style="margin-top:12px;display:flex;flex-direction:column;gap:6px">
        <div style="display:flex;gap:6px;align-items:center">
          <input type="text" inputmode="numeric" id="cash-amount" placeholder="금액" style="flex:1;padding:7px 10px;border:1px solid #d1d5db;border-radius:7px;font-size:14px">
          <span style="color:#6b7280;font-size:14px">원</span>
        </div>
        <div style="display:flex;gap:6px">
          <input type="date" id="cash-date" style="flex:1;padding:7px 10px;border:1px solid #d1d5db;border-radius:7px;font-size:14px">
          <input type="text" id="cash-memo" placeholder="메모" style="flex:2;padding:7px 10px;border:1px solid #d1d5db;border-radius:7px;font-size:14px">
        </div>
        <button class="btn btn-success" id="btn-cash-add" style="align-self:flex-end;padding:6px 18px">+ 현금 추가</button>
      </div>
    </div>
  </div>

  <!-- 액션 -->
  <div class="card">
    <h2>액션</h2>
    <div class="btn-row">
      <button class="btn btn-outline" id="btn-print">🖨 주문서 출력</button>
      <button class="btn btn-outline" id="btn-edit">✏️ 수정</button>
    </div>
  </div>
</div>

<!-- 출력 영역 -->
<div id="print-area" style="display:none">
  <div class="print-box">
    <div class="print-title">🫐 블루베리 주문서</div>
    <div id="print-content"></div>
  </div>
</div>

<script src="config.js"></script>
<script src="common.js"></script>
<script src="nav.js"></script>
<script>
const API = BB_CONFIG.API;
const BADGE_COLORS = [
  { bg: '#eff6ff', border: '#bfdbfe', text: '#1d4ed8', qty: '#1d4ed8' },
  { bg: '#fef9c3', border: '#fde047', text: '#854d0e', qty: '#854d0e' },
  { bg: '#dcfce7', border: '#86efac', text: '#15803d', qty: '#15803d' },
  { bg: '#fce7f3', border: '#f9a8d4', text: '#9d174d', qty: '#9d174d' },
  { bg: '#f3e8ff', border: '#d8b4fe', text: '#6b21a8', qty: '#6b21a8' },
  { bg: '#ffedd5', border: '#fdba74', text: '#9a3412', qty: '#9a3412' },
  { bg: '#e0f2fe', border: '#7dd3fc', text: '#0369a1', qty: '#0369a1' },
  { bg: '#f1f5f9', border: '#94a3b8', text: '#334155', qty: '#334155' },
];
const productColorMap = {};
let productColorIdx = 0;
function getProductColor(name) {
  const preset = (BB_CONFIG.PRODUCTS || []).find(p => p.name === name);
  if (preset?.color) return preset.color;
  if (!productColorMap[name]) {
    productColorMap[name] = BADGE_COLORS[productColorIdx % BADGE_COLORS.length];
    productColorIdx++;
  }
  return productColorMap[name];
}
const STATUSES = ['주문입력', '주문확정', '주문출력', '송장출력', '배송완료'];
const params = new URLSearchParams(location.search);
const orderId = params.get('id');
let order = null;

async function loadOrder() {
  const orderRes = await fetch(`${API}/api/orders/${orderId}`);
  order = await orderRes.json();
  render();
}

const STATUS_COLOR = {
  '주문입력': '#d1d5db',
  '주문확정': '#fde047',
  '주문출력': '#16a34a',
  '송장출력': '#f97316',
  '배송완료': '#3b82f6',
};

function render() {
  document.getElementById('page-title').textContent = order.order_no || `주문 #${order.id}`;

  // 기존 status='수금완료' 데이터는 배송완료로 표시
  const displayStatus = order.status === '수금완료' ? '배송완료' : order.status;
  const currentColor = STATUS_COLOR[displayStatus] || '#2563eb';

  // 진행 상태 카드 테두리 색상
  document.querySelector('.card').style.borderTop = `4px solid ${currentColor}`;

  // 수금 배지
  const isPaid = order.payment_status === '수금완료' || order.status === '수금완료';
  document.getElementById('payment-status-wrap').style.display = isPaid ? '' : 'none';

  // 상태 흐름
  const flow = document.getElementById('status-flow');
  flow.innerHTML = '';
  const idx = STATUSES.indexOf(displayStatus);
  STATUSES.forEach((s, i) => {
    const isDone = i < idx;
    const isCurrent = i === idx;
    const color = STATUS_COLOR[s] || '#2563eb';
    const step = document.createElement('div');
    step.className = 'step';

    const dot = document.createElement('div');
    dot.className = 'step-dot';
    dot.textContent = isDone ? '✓' : i + 1;
    if (isDone) {
      dot.style.background = color;
      dot.style.borderColor = color;
      dot.style.color = '#fff';
    } else if (isCurrent) {
      dot.style.background = '#fff';
      dot.style.borderColor = color;
      dot.style.color = color;
      dot.style.borderWidth = '3px';
    }

    const label = document.createElement('div');
    label.className = 'step-label';
    label.textContent = s;
    if (isCurrent) {
      label.style.color = color;
      label.style.fontWeight = '700';
    }

    step.appendChild(dot);
    step.appendChild(label);
    flow.appendChild(step);

    if (i < STATUSES.length - 1) {
      const arrow = document.createElement('div');
      arrow.className = 'step-arrow';
      arrow.textContent = '›';
      flow.appendChild(arrow);
    }
  });

  // 상태 변경 버튼
  const statusBtns = document.getElementById('status-btns');
  statusBtns.innerHTML = '';

  // 이전 단계 버튼 (왼쪽)
  if (idx > 0) {
    const prevColor = STATUS_COLOR[STATUSES[idx - 1]] || '#94a3b8';
    const btn = document.createElement('button');
    btn.className = 'btn btn-outline';
    btn.textContent = `← ${STATUSES[idx - 1]}로 되돌리기`;
    btn.style.borderColor = prevColor;
    btn.style.color = prevColor;
    btn.addEventListener('click', () => updateStatus(STATUSES[idx - 1]));
    statusBtns.appendChild(btn);
  }

  // 다음 단계 버튼 (오른쪽)
  if (idx < STATUSES.length - 1) {
    const next = STATUSES[idx + 1];
    const nextColor = STATUS_COLOR[next] || '#2563eb';
    const btn = document.createElement('button');
    btn.className = 'btn btn-primary';
    btn.textContent = `→ ${next}`;
    btn.style.background = nextColor;
    btn.style.borderColor = nextColor;
    btn.addEventListener('click', async () => {
      if (next === '주문확정') {
        await confirmOrder();
      } else {
        await updateStatus(next);
      }
    });
    statusBtns.appendChild(btn);
  }

  // 주문 정보
  document.getElementById('d-order-no').textContent   = order.order_no || '-';
  document.getElementById('d-date').textContent       = order.created_at || '-';
  document.getElementById('d-orderer').innerHTML =
    `${order.orderer_name} ${formatPhone(order.orderer_phone)}` +
    (order.orderer_memo ? `<div style="font-size:11px;color:#f59e0b;font-weight:600;margin-top:2px">📝 ${order.orderer_memo}</div>` : '');
  document.getElementById('d-recipient').innerHTML = order.recipient_name
    ? `${order.recipient_name} ${formatPhone(order.recipient_phone)}` +
      (order.recipient_memo ? `<div style="font-size:11px;color:#f59e0b;font-weight:600;margin-top:2px">📝 ${order.recipient_memo}</div>` : '')
    : '주문자와 동일';
  document.getElementById('d-delivery').textContent   = order.delivery_type;

  // 택배가 아니면 SMS 토글 숨김 + 강제 OFF
  const isCourier = order.delivery_type === '택배';
  document.getElementById('sms-toggle-wrap').style.display = isCourier ? '' : 'none';
  if (!isCourier) {
    document.getElementById('sms-toggle').checked = false;
    applySmsToggle();
  }
  document.getElementById('d-address').textContent    = order.address || '-';
  document.getElementById('d-priority').textContent   = 'P' + order.priority;
  document.getElementById('d-printed').innerHTML      = order.printed_at
    ? `<span style="color:#10b981">✅ 출력완료 (${order.printed_at.slice(0,16)})</span>`
    : `<span style="color:#9ca3af">미출력</span>`;
  document.getElementById('d-memo').textContent       = order.memo || '-';

  // 상품
  const tbody = document.getElementById('d-items');
  tbody.innerHTML = '';
  let itemSum = 0;
  (order.items || []).forEach(item => {
    const sub = item.unit_price * item.qty;
    itemSum += sub;
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${(() => { const c = getProductColor(item.product); return `<span class="item-badge" style="background:${c.bg};border:1px solid ${c.border};color:${c.text}">${item.product}</span>`; })()}</td>
      <td>${item.unit_price.toLocaleString()}원</td>
      <td>${item.qty}kg</td>
      <td>${sub.toLocaleString()}원</td>`;
    tbody.appendChild(tr);
  });
  document.getElementById('d-sum-items').textContent = itemSum.toLocaleString() + '원';
  document.getElementById('d-shipping').textContent  = order.shipping_fee.toLocaleString() + '원';
  document.getElementById('d-total').textContent     = order.total_amount.toLocaleString() + '원';

  // 송장번호
  document.getElementById('tracking-input').value = order.tracking_no || '';
  document.getElementById('tracking-card').style.display =
    order.delivery_type === '택배' ? '' : 'none';
  updateTrackLink(order.tracking_no);

}

async function updateStatus(status) {
  const prevStatus = order?.status;
  await fetch(`${API}/api/orders/${orderId}/status`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ status })
  });
  // 송장출력 → 주문출력으로 뒤로 갈 때 SMS 대기열 삭제
  if (prevStatus === '송장출력' && status === '주문출력') {
    await fetch(`${API}/api/sms-queue?order_id=${orderId}`, { method: 'DELETE' });
  }
  showToast(`✅ ${status} 처리 완료`);
  await loadOrder();
}

async function confirmOrder() {
  const smsOn = document.getElementById('sms-toggle').checked;
  if (smsOn) {
    await fetch(`${API}/api/orders/${orderId}/confirm`, { method: 'PUT', headers: { 'Content-Type': 'application/json' } });
    showToast('✅ 주문확정 및 문자 발송 등록 완료');
  } else {
    await fetch(`${API}/api/orders/${orderId}/status`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: '주문확정' }),
    });
    showToast('✅ 주문확정 (문자 미발송)');
  }
  await loadOrder();
}


function updateTrackLink(val) {
  const link = document.getElementById('btn-track-link');
  const digits = (val || '').replace(/[^0-9]/g, '');
  if (digits.length === 11) {
    link.href = `https://www.ilogen.com/m/personal/trace/${digits}`;
    link.style.display = '';
  } else {
    link.style.display = 'none';
  }
}

document.getElementById('tracking-input').addEventListener('input', (e) => {
  const digits = e.target.value.replace(/[^0-9]/g, '').slice(0, 11);
  if (digits.length <= 3) e.target.value = digits;
  else if (digits.length <= 7) e.target.value = `${digits.slice(0,3)}-${digits.slice(3)}`;
  else e.target.value = `${digits.slice(0,3)}-${digits.slice(3,7)}-${digits.slice(7)}`;
  updateTrackLink(e.target.value);
});

document.getElementById('btn-save-tracking').addEventListener('click', async () => {
  let val = document.getElementById('tracking-input').value.trim();
  if (val) {
    // 숫자만 추출
    const digits = val.replace(/[^0-9]/g, '');
    if (digits.length === 11) {
      val = `${digits.slice(0,3)}-${digits.slice(3,7)}-${digits.slice(7,11)}`;
    }
    document.getElementById('tracking-input').value = val;
  }
  await fetch(`${API}/api/orders/${orderId}/tracking_no`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ tracking_no: val })
  });
  showToast('✅ 송장번호 저장됨');
  await loadOrder();
});

document.getElementById('btn-print').addEventListener('click', () => {
  const items = (order.items || []).map(i =>
    `<div class="print-row"><span class="pl">${i.product} × ${i.qty}</span><span class="pv">${(i.unit_price * i.qty).toLocaleString()}원</span></div>`
  ).join('');
  const trackings = order.tracking_no
    ? `<div class="print-tracking">송장번호: ${order.tracking_no}</div>`
    : '';
  document.getElementById('print-content').innerHTML = `
    <div class="print-row"><span class="pl">주문번호</span><span class="pv">${order.order_no || '#' + order.id}</span></div>
    <div class="print-row"><span class="pl">주문자</span><span class="pv">${order.orderer_name} ${formatPhone(order.orderer_phone)}</span></div>
    <div class="print-row"><span class="pl">수령자</span><span class="pv">${order.recipient_name || order.orderer_name} ${formatPhone(order.recipient_phone || order.orderer_phone)}</span></div>
    <div class="print-row"><span class="pl">배송방법</span><span class="pv">${order.delivery_type}</span></div>
    ${order.address ? `<div class="print-row"><span class="pl">주소</span><span class="pv">${order.address}</span></div>` : ''}
    <div class="print-items">${items}</div>
    <div class="print-row"><span class="pl">택배비</span><span class="pv">${order.shipping_fee.toLocaleString()}원</span></div>
    <div class="print-total">청구금액 ${order.total_amount.toLocaleString()}원</div>
    ${order.memo ? `<div class="print-memo">📝 ${order.memo}</div>` : ''}
    ${trackings}`;
  document.getElementById('print-area').style.display = '';
  window.print();
  document.getElementById('print-area').style.display = 'none';
});

document.getElementById('btn-edit').addEventListener('click', () => {
  window.location.href = `order-edit.html?id=${orderId}`;
});

// ── SMS 토글 ──────────────────────────────────────────
const smsToggle = document.getElementById('sms-toggle');
const smsLabel  = document.getElementById('sms-toggle-label');
const smsWrap   = document.getElementById('sms-toggle-wrap');

function applySmsToggle() {
  const on = smsToggle.checked;
  smsLabel.textContent = on ? '문자 ON' : '문자 OFF';
  smsWrap.classList.toggle('on', on);
  localStorage.setItem('sms_send_enabled', on ? '1' : '0');
}

smsToggle.checked = localStorage.getItem('sms_send_enabled') === '1';
applySmsToggle();
smsToggle.addEventListener('change', applySmsToggle);

loadOrder();

// ── 입금 연결 ─────────────────────────────────────────
let selectedTxn = null;

// 탭 전환
document.getElementById('tab-transfer').addEventListener('click', () => {
  document.getElementById('tab-transfer').classList.add('active');
  document.getElementById('tab-cash').classList.remove('active');
  document.getElementById('panel-transfer').style.display = '';
  document.getElementById('panel-cash').style.display = 'none';
});
document.getElementById('tab-cash').addEventListener('click', () => {
  document.getElementById('tab-cash').classList.add('active');
  document.getElementById('tab-transfer').classList.remove('active');
  document.getElementById('panel-cash').style.display = '';
  document.getElementById('panel-transfer').style.display = 'none';
  // 금액: 청구금액 프리셋 (비어있을 때만)
  if (!document.getElementById('cash-amount').value && order?.total_amount) {
    document.getElementById('cash-amount').value = order.total_amount.toLocaleString();
  }
  // 날짜: 오늘 프리셋 (비어있을 때만)
  if (!document.getElementById('cash-date').value) {
    document.getElementById('cash-date').value = new Date().toISOString().slice(0, 10);
  }
  loadCashPayments();
});

async function renderPaymentSummary(transferTotal, cashTotal) {
  const totalEl = document.getElementById('txn-linked-total');
  const bill = order?.total_amount || 0;
  const paid = transferTotal + cashTotal;
  const remaining = bill - paid;
  if (!transferTotal && !cashTotal) { totalEl.style.display = 'none'; return; }
  totalEl.style.display = '';
  totalEl.style.background = remaining <= 0 ? '#dcfce7' : '#fef9c3';
  totalEl.style.color = remaining <= 0 ? '#15803d' : '#854d0e';
  totalEl.innerHTML = `
    <div style="display:flex;justify-content:space-between;margin-bottom:3px">
      <span>청구금액</span><span>${bill.toLocaleString()}원</span>
    </div>
    ${transferTotal ? `<div style="display:flex;justify-content:space-between;margin-bottom:3px">
      <span>이체입금</span><span>${transferTotal.toLocaleString()}원</span>
    </div>` : ''}
    ${cashTotal ? `<div style="display:flex;justify-content:space-between;margin-bottom:3px">
      <span>현금입금</span><span>${cashTotal.toLocaleString()}원</span>
    </div>` : ''}
    ${(transferTotal && cashTotal) ? `<div style="display:flex;justify-content:space-between;margin-bottom:3px">
      <span>입금합계</span><span>${paid.toLocaleString()}원</span>
    </div>` : ''}
    <div style="display:flex;justify-content:space-between;font-size:14px">
      <span>${remaining <= 0 ? '✅ 완납' : '미수'}</span>
      <span style="font-weight:800">${remaining <= 0 ? '0원' : remaining.toLocaleString()+'원'}</span>
    </div>`;
}

async function loadTxnLinks() {
  const [linksRes, cashRes] = await Promise.all([
    fetch(`${API}/api/orders/${orderId}/txn-links`),
    fetch(`${API}/api/orders/${orderId}/cash-payments`)
  ]);
  const links = await linksRes.json();
  const cashes = await cashRes.json();

  const list = document.getElementById('txn-links-list');
  if (!links.length) {
    list.innerHTML = '<div style="color:#9ca3af;font-size:13px">연결된 입금 없음</div>';
  } else {
    const transferTotal = links.reduce((s, l) => s + (l.amount || 0), 0);
    list.innerHTML = links.map(l => `
      <div class="txn-link-row">
        <span class="txn-link-date">${(l.txn_at||'').slice(0,16)}</span>
        <span class="txn-link-memo">${l.memo||'-'}</span>
        <span class="txn-link-amt">${(l.amount||0).toLocaleString()}원</span>
        <button class="txn-link-del" data-link-id="${l.id}">✕</button>
      </div>`).join('');
    list.querySelectorAll('.txn-link-del').forEach(btn => {
      btn.addEventListener('click', async () => {
        if (!confirm('연결을 삭제할까요?')) return;
        await fetch(`${API}/api/txn-links/${btn.dataset.linkId}`, { method: 'DELETE' });
        showToast('연결 삭제됨');
        loadTxnLinks();
        loadOrder();
      });
    });
  }

  const transferTotal = links.reduce((s, l) => s + (l.amount || 0), 0);
  const cashTotal = cashes.reduce((s, c) => s + (c.amount || 0), 0);
  renderPaymentSummary(transferTotal, cashTotal);
}

async function loadCashPayments() {
  const res = await fetch(`${API}/api/orders/${orderId}/cash-payments`);
  const cashes = await res.json();
  const list = document.getElementById('cash-list');
  if (!cashes.length) {
    list.innerHTML = '<div style="color:#9ca3af;font-size:13px">현금 입금 없음</div>';
  } else {
    list.innerHTML = cashes.map(c => `
      <div class="txn-link-row">
        <span class="txn-link-date">${(c.paid_at||'').slice(0,10)}</span>
        <span class="txn-link-memo">${c.memo||'-'}</span>
        <span class="txn-link-amt">${(c.amount||0).toLocaleString()}원</span>
        <button class="txn-link-del" data-cash-id="${c.id}">✕</button>
      </div>`).join('');
    list.querySelectorAll('.txn-link-del').forEach(btn => {
      btn.addEventListener('click', async () => {
        if (!confirm('현금 입금을 삭제할까요?')) return;
        await fetch(`${API}/api/cash-payments/${btn.dataset.cashId}`, { method: 'DELETE' });
        showToast('삭제됨');
        loadTxnLinks();
        loadCashPayments();
      });
    });
  }
}

document.getElementById('cash-amount').addEventListener('input', (e) => {
  const raw = e.target.value.replace(/[^0-9]/g, '');
  e.target.value = raw ? Number(raw).toLocaleString() : '';
});

document.getElementById('btn-cash-add').addEventListener('click', async () => {
  const amount = parseInt(document.getElementById('cash-amount').value.replace(/,/g, '')) || 0;
  if (!amount) { showToast('금액을 입력하세요'); return; }
  const paid_at = document.getElementById('cash-date').value;
  const memo = document.getElementById('cash-memo').value.trim();
  await fetch(`${API}/api/orders/${orderId}/cash-payments`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ amount, paid_at, memo })
  });
  document.getElementById('cash-amount').value = '';
  document.getElementById('cash-memo').value = '';
  showToast('✅ 현금 입금 등록됨');
  loadTxnLinks();
  loadCashPayments();
});

async function searchTxns() {
  const q = document.getElementById('txn-search-input').value.trim();
  if (!q) return;
  const res = await fetch(`${API}/api/transactions?q=${encodeURIComponent(q)}`);
  const txns = await res.json();
  const result = document.getElementById('txn-result');
  result.style.display = 'block';
  if (!txns.length) {
    result.innerHTML = '<div style="padding:10px;font-size:13px;color:#9ca3af">결과 없음</div>';
    return;
  }
  result.innerHTML = txns.slice(0, 20).map(t => {
    const remain = (t.deposit||0) - (t.linked_amount||0);
    return `
    <div class="txn-result-item" data-id="${t.id}" data-deposit="${t.deposit}" data-memo="${t.memo||''}">
      <span class="txn-result-date">${(t.txn_at||'').slice(0,10)}</span>
      <span class="txn-result-memo">${t.memo||'-'}</span>
      <span class="txn-result-amt">
        <span style="color:#2563eb;font-weight:800">잔액 ${remain.toLocaleString()}원</span>
        <span style="color:#9ca3af;font-size:11px;margin-left:4px">/ ${(t.deposit||0).toLocaleString()}원</span>
      </span>
    </div>`;
  }).join('');
  result.querySelectorAll('.txn-result-item').forEach(item => {
    item.addEventListener('click', () => {
      selectedTxn = { id: +item.dataset.id, deposit: +item.dataset.deposit, memo: item.dataset.memo };
      document.getElementById('txn-selected-label').textContent = `${selectedTxn.memo} · ${selectedTxn.deposit.toLocaleString()}원`;
      document.getElementById('txn-link-amount').value = order?.total_amount || selectedTxn.deposit;
      document.getElementById('txn-link-form').style.display = 'flex';
      result.style.display = 'none';
    });
  });
}

document.getElementById('btn-txn-search').addEventListener('click', searchTxns);
document.getElementById('txn-search-input').addEventListener('keydown', e => { if (e.key === 'Enter') searchTxns(); });

document.getElementById('btn-txn-link-confirm').addEventListener('click', async () => {
  if (!selectedTxn) return;
  const amount = parseInt(document.getElementById('txn-link-amount').value) || 0;
  if (!amount) { showToast('금액을 입력하세요'); return; }

  // 1. 입금-주문 연결
  await fetch(`${API}/api/transactions/${selectedTxn.id}/links`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ links: [{ order_id: orderId, amount }] })
  });

  // 2. 수금완료 처리 (payment_status)
  await fetch(`${API}/api/orders/${orderId}/payment-status`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ payment_status: '수금완료' })
  });

  // 3. 잔액 확인 → 0원이면 트랜잭션 자동 완료 (단건 조회)
  const txnRes = await fetch(`${API}/api/transactions/${selectedTxn.id}`);
  const txn = await txnRes.json();
  const remain = txn.deposit - (txn.linked_amount || 0);
  if (remain <= 0) {
    await fetch(`${API}/api/transactions/${selectedTxn.id}/status`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ txn_status: '완료' })
    });
    showToast('✅ 입금 연결 완료 — 잔액 0원, 트랜잭션 완료 처리됨');
  } else {
    showToast(`✅ 입금 연결됨 — 잔액 ${remain.toLocaleString()}원 남음`);
  }

  document.getElementById('txn-link-form').style.display = 'none';
  document.getElementById('txn-search-input').value = '';
  selectedTxn = null;
  loadTxnLinks();
  loadOrder();
});

document.getElementById('btn-txn-link-cancel').addEventListener('click', () => {
  document.getElementById('txn-link-form').style.display = 'none';
  selectedTxn = null;
});

loadTxnLinks();
</script>
</body>
</html>
