<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주문 상세 — bb</title>
<link rel="stylesheet" href="style.css">
<style>
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { background: #f9fafb; padding: 7px 10px; text-align: left; font-size: 12px; color: #6b7280; border-bottom: 1px solid #e5e7eb; }
  td { padding: 8px 10px; border-bottom: 1px solid #f3f4f6; }

  /* SMS 토글 */
  .sms-toggle-wrap { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #6b7280; }
  .sms-toggle-wrap.on { color: #2563eb; }
  .toggle-switch { position: relative; width: 36px; height: 20px; cursor: pointer; }
  .toggle-switch input { opacity: 0; width: 0; height: 0; }
  .toggle-track { position: absolute; inset: 0; background: #d1d5db; border-radius: 99px; transition: background .2s; }
  .toggle-thumb { position: absolute; top: 3px; left: 3px; width: 14px; height: 14px;
    background: #fff; border-radius: 50%; transition: transform .2s; }
  .toggle-switch input:checked ~ .toggle-track { background: #2563eb; }
  .toggle-switch input:checked ~ .toggle-thumb { transform: translateX(16px); }
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <button class="btn-back" onclick="history.back()">←</button>
    <h1 id="page-title">주문 상세</h1>
  </div>

  <!-- 상태 흐름 -->
  <div class="card">
    <h2>진행 상태</h2>
    <div class="status-flow" id="status-flow"></div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:16px;flex-wrap:wrap;gap:8px">
      <div class="btn-row" id="status-btns"></div>
      <label class="sms-toggle-wrap" id="sms-toggle-wrap" title="주문확정 시 문자 발송 여부">
        <label class="toggle-switch">
          <input type="checkbox" id="sms-toggle">
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </label>
        <span id="sms-toggle-label">문자 OFF</span>
      </label>
    </div>
  </div>

  <!-- 주문 정보 -->
  <div class="card">
    <h2>주문 정보</h2>
    <div class="info-row"><span class="info-label">주문번호</span><span class="info-value" id="d-order-no"></span></div>
    <div class="info-row"><span class="info-label">접수일시</span><span class="info-value" id="d-date"></span></div>
    <div class="info-row"><span class="info-label">주문자</span><span class="info-value" id="d-orderer"></span></div>
    <div class="info-row"><span class="info-label">수령자</span><span class="info-value" id="d-recipient"></span></div>
    <div class="info-row"><span class="info-label">배송방법</span><span class="info-value" id="d-delivery"></span></div>
    <div class="info-row"><span class="info-label">주소</span><span class="info-value" id="d-address"></span></div>
    <div class="info-row"><span class="info-label">우선순위</span><span class="info-value" id="d-priority"></span></div>
    <div class="info-row"><span class="info-label">주문서</span><span class="info-value" id="d-printed"></span></div>
    <div class="info-row"><span class="info-label">메모</span><span class="info-value" id="d-memo"></span></div>
  </div>

  <!-- 상품 -->
  <div class="card">
    <h2>상품</h2>
    <table>
      <thead><tr><th>상품</th><th>단가</th><th>수량</th><th>소계</th></tr></thead>
      <tbody id="d-items"></tbody>
    </table>
    <div class="amount-box" style="margin-top:12px">
      <div class="amount-row"><span>상품금액</span><span id="d-sum-items"></span></div>
      <div class="amount-row"><span>택배비</span><span id="d-shipping"></span></div>
      <div class="amount-row total"><span>청구금액</span><span id="d-total"></span></div>
    </div>
  </div>

  <!-- 송장번호 -->
  <div class="card" id="tracking-card">
    <h2>송장번호</h2>
    <div class="tracking-add">
      <input type="text" id="tracking-input" placeholder="송장번호 입력">
      <button class="btn btn-primary" id="btn-save-tracking">저장</button>
    </div>
  </div>

  <!-- 수금 -->
  <div class="card">
    <h2>수금 상태</h2>
    <div class="info-row">
      <span class="info-label">수금 상태</span>
      <span class="info-value" id="d-payment-status"></span>
    </div>
    <div class="btn-row" style="margin-top:12px" id="payment-btns"></div>
  </div>

  <!-- 액션 -->
  <div class="card">
    <h2>액션</h2>
    <div class="btn-row">
      <button class="btn btn-outline" id="btn-print">🖨 주문서 출력</button>
      <button class="btn btn-outline" id="btn-edit">✏️ 수정</button>
    </div>
  </div>
</div>

<!-- 출력 영역 -->
<div id="print-area" style="display:none">
  <div class="print-box">
    <div class="print-title">🫐 블루베리 주문서</div>
    <div id="print-content"></div>
  </div>
</div>

<script src="config.js"></script>
<script src="common.js"></script>
<script src="nav.js"></script>
<script>
const API = BB_CONFIG.API;
const STATUSES = ['주문입력', '주문확정', '주문출력', '송장출력', '배송완료', '수금완료'];
const params = new URLSearchParams(location.search);
const orderId = params.get('id');
let order = null;

async function loadOrder() {
  const orderRes = await fetch(`${API}/api/orders/${orderId}`);
  order = await orderRes.json();
  render();
}

const STATUS_COLOR = {
  '주문입력': '#d1d5db',
  '주문확정': '#fde047',
  '주문출력': '#16a34a',
  '송장출력': '#f97316',
  '배송완료': '#e5e7eb',
  '수금완료': '#1e293b',
};

function render() {
  document.getElementById('page-title').textContent = order.order_no || `주문 #${order.id}`;

  const currentColor = STATUS_COLOR[order.status] || '#2563eb';

  // 진행 상태 카드 테두리 색상
  document.querySelector('.card').style.borderTop = `4px solid ${currentColor}`;

  // 상태 흐름
  const flow = document.getElementById('status-flow');
  flow.innerHTML = '';
  const idx = STATUSES.indexOf(order.status);
  STATUSES.forEach((s, i) => {
    const isDone = i < idx;
    const isCurrent = i === idx;
    const color = STATUS_COLOR[s] || '#2563eb';
    const step = document.createElement('div');
    step.className = 'step';

    const dot = document.createElement('div');
    dot.className = 'step-dot';
    dot.textContent = isDone ? '✓' : i + 1;
    if (isDone) {
      dot.style.background = color;
      dot.style.borderColor = color;
      dot.style.color = '#fff';
    } else if (isCurrent) {
      dot.style.background = '#fff';
      dot.style.borderColor = color;
      dot.style.color = color;
      dot.style.borderWidth = '3px';
    }

    const label = document.createElement('div');
    label.className = 'step-label';
    label.textContent = s;
    if (isCurrent) {
      label.style.color = color;
      label.style.fontWeight = '700';
    }

    step.appendChild(dot);
    step.appendChild(label);
    flow.appendChild(step);

    if (i < STATUSES.length - 1) {
      const arrow = document.createElement('div');
      arrow.className = 'step-arrow';
      arrow.textContent = '›';
      flow.appendChild(arrow);
    }
  });

  // 상태 변경 버튼
  const statusBtns = document.getElementById('status-btns');
  statusBtns.innerHTML = '';

  // 이전 단계 버튼 (왼쪽)
  if (idx > 0) {
    const prevColor = STATUS_COLOR[STATUSES[idx - 1]] || '#94a3b8';
    const btn = document.createElement('button');
    btn.className = 'btn btn-outline';
    btn.textContent = `← ${STATUSES[idx - 1]}로 되돌리기`;
    btn.style.borderColor = prevColor;
    btn.style.color = prevColor;
    btn.addEventListener('click', () => updateStatus(STATUSES[idx - 1]));
    statusBtns.appendChild(btn);
  }

  // 다음 단계 버튼 (오른쪽)
  if (idx < STATUSES.length - 1) {
    const next = STATUSES[idx + 1];
    const nextColor = STATUS_COLOR[next] || '#2563eb';
    const btn = document.createElement('button');
    btn.className = 'btn btn-primary';
    btn.textContent = `→ ${next}`;
    btn.style.background = nextColor;
    btn.style.borderColor = nextColor;
    btn.addEventListener('click', async () => {
      if (next === '주문확정') {
        await confirmOrder();
      } else {
        await updateStatus(next);
      }
    });
    statusBtns.appendChild(btn);
  }

  // 주문 정보
  document.getElementById('d-order-no').textContent   = order.order_no || '-';
  document.getElementById('d-date').textContent       = order.created_at || '-';
  document.getElementById('d-orderer').innerHTML =
    `${order.orderer_name} ${order.orderer_phone}` +
    (order.orderer_memo ? `<div style="font-size:11px;color:#f59e0b;font-weight:600;margin-top:2px">📝 ${order.orderer_memo}</div>` : '');
  document.getElementById('d-recipient').innerHTML = order.recipient_name
    ? `${order.recipient_name} ${order.recipient_phone}` +
      (order.recipient_memo ? `<div style="font-size:11px;color:#f59e0b;font-weight:600;margin-top:2px">📝 ${order.recipient_memo}</div>` : '')
    : '주문자와 동일';
  document.getElementById('d-delivery').textContent   = order.delivery_type;
  document.getElementById('d-address').textContent    = order.address || '-';
  document.getElementById('d-priority').textContent   = 'P' + order.priority;
  document.getElementById('d-printed').innerHTML      = order.printed_at
    ? `<span style="color:#10b981">✅ 출력완료 (${order.printed_at.slice(0,16)})</span>`
    : `<span style="color:#9ca3af">미출력</span>`;
  document.getElementById('d-memo').textContent       = order.memo || '-';

  // 상품
  const tbody = document.getElementById('d-items');
  tbody.innerHTML = '';
  let itemSum = 0;
  (order.items || []).forEach(item => {
    const sub = item.unit_price * item.qty;
    itemSum += sub;
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${item.product}</td>
      <td>${item.unit_price.toLocaleString()}원</td>
      <td>${item.qty}kg</td>
      <td>${sub.toLocaleString()}원</td>`;
    tbody.appendChild(tr);
  });
  document.getElementById('d-sum-items').textContent = itemSum.toLocaleString() + '원';
  document.getElementById('d-shipping').textContent  = order.shipping_fee.toLocaleString() + '원';
  document.getElementById('d-total').textContent     = order.total_amount.toLocaleString() + '원';

  // 송장번호
  document.getElementById('tracking-input').value = order.tracking_no || '';
  document.getElementById('tracking-card').style.display =
    order.delivery_type === '택배' ? '' : 'none';

  // 수금
  document.getElementById('d-payment-status').innerHTML =
    `<span class="badge badge-${order.payment_status}">${order.payment_status}</span>`;
  const payBtns = document.getElementById('payment-btns');
  payBtns.innerHTML = '';
  ['미수', '부분수금', '수금'].forEach(s => {
    if (s === order.payment_status) return;
    const btn = document.createElement('button');
    btn.className = 'btn btn-outline';
    btn.textContent = s + ' 처리';
    btn.addEventListener('click', () => updatePayment(s));
    payBtns.appendChild(btn);
  });
}

async function updateStatus(status) {
  await fetch(`${API}/api/orders/${orderId}/status`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ status })
  });
  showToast(`✅ ${status} 처리 완료`);
  await loadOrder();
}

async function confirmOrder() {
  const smsOn = document.getElementById('sms-toggle').checked;
  if (smsOn) {
    await fetch(`${API}/api/orders/${orderId}/confirm`, { method: 'PUT', headers: { 'Content-Type': 'application/json' } });
    showToast('✅ 주문확정 및 문자 발송 등록 완료');
  } else {
    await fetch(`${API}/api/orders/${orderId}/status`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: '주문확정' }),
    });
    showToast('✅ 주문확정 (문자 미발송)');
  }
  await loadOrder();
}

async function updatePayment(payment_status) {
  await fetch(`${API}/api/orders/${orderId}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      order_no:       order.order_no,
      orderer_id:     order.orderer_id,
      recipient_id:   order.recipient_id,
      address_id:     order.address_id,
      delivery_type:  order.delivery_type,
      priority:       order.priority,
      memo:           order.memo,
      items:          order.items,
      shipping_fee:   order.shipping_fee,
      status:         order.status,
      payment_status
    })
  });
  showToast(`✅ ${payment_status} 처리 완료`);
  await loadOrder();
}

document.getElementById('btn-save-tracking').addEventListener('click', async () => {
  let val = document.getElementById('tracking-input').value.trim();
  if (val) {
    // 숫자만 추출
    const digits = val.replace(/[^0-9]/g, '');
    // 12자리면 0000-0000-0000 형식으로 변환
    if (digits.length === 12) {
      val = `${digits.slice(0,4)}-${digits.slice(4,8)}-${digits.slice(8,12)}`;
    }
    document.getElementById('tracking-input').value = val;
  }
  await fetch(`${API}/api/orders/${orderId}/tracking_no`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ tracking_no: val })
  });
  showToast('✅ 송장번호 저장됨');
  await loadOrder();
});

document.getElementById('btn-print').addEventListener('click', () => {
  const items = (order.items || []).map(i =>
    `<div class="print-row"><span class="pl">${i.product} × ${i.qty}</span><span class="pv">${(i.unit_price * i.qty).toLocaleString()}원</span></div>`
  ).join('');
  const trackings = order.tracking_no
    ? `<div class="print-tracking">송장번호: ${order.tracking_no}</div>`
    : '';
  document.getElementById('print-content').innerHTML = `
    <div class="print-row"><span class="pl">주문번호</span><span class="pv">${order.order_no || '#' + order.id}</span></div>
    <div class="print-row"><span class="pl">주문자</span><span class="pv">${order.orderer_name} ${order.orderer_phone}</span></div>
    <div class="print-row"><span class="pl">수령자</span><span class="pv">${order.recipient_name || order.orderer_name} ${order.recipient_phone || order.orderer_phone}</span></div>
    <div class="print-row"><span class="pl">배송방법</span><span class="pv">${order.delivery_type}</span></div>
    ${order.address ? `<div class="print-row"><span class="pl">주소</span><span class="pv">${order.address}</span></div>` : ''}
    <div class="print-items">${items}</div>
    <div class="print-row"><span class="pl">택배비</span><span class="pv">${order.shipping_fee.toLocaleString()}원</span></div>
    <div class="print-total">청구금액 ${order.total_amount.toLocaleString()}원</div>
    ${order.memo ? `<div class="print-memo">📝 ${order.memo}</div>` : ''}
    ${trackings}`;
  document.getElementById('print-area').style.display = '';
  window.print();
  document.getElementById('print-area').style.display = 'none';
});

document.getElementById('btn-edit').addEventListener('click', () => {
  window.location.href = `order-edit.html?id=${orderId}`;
});

// ── SMS 토글 ──────────────────────────────────────────
const smsToggle = document.getElementById('sms-toggle');
const smsLabel  = document.getElementById('sms-toggle-label');
const smsWrap   = document.getElementById('sms-toggle-wrap');

function applySmsToggle() {
  const on = smsToggle.checked;
  smsLabel.textContent = on ? '문자 ON' : '문자 OFF';
  smsWrap.classList.toggle('on', on);
  localStorage.setItem('sms_send_enabled', on ? '1' : '0');
}

smsToggle.checked = localStorage.getItem('sms_send_enabled') === '1';
applySmsToggle();
smsToggle.addEventListener('change', applySmsToggle);

loadOrder();
</script>
</body>
</html>
