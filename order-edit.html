<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주문 수정 — bb</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap">
  <div class="top">
    <button class="btn-back" onclick="history.back()">←</button>
    <h1 id="page-title">주문 수정</h1>
  </div>

  <!-- 주문번호 -->
  <div class="card">
    <h2>주문번호</h2>
    <div class="field">
      <input type="text" id="order-no" placeholder="주문번호">
      <div class="order-no-msg" id="order-no-msg"></div>
    </div>
  </div>

  <!-- 주문자 -->
  <div class="card">
    <h2>주문자</h2>
    <div class="field" id="orderer-search-wrap" style="display:none">
      <div class="search-box">
        <input type="text" id="orderer-input" placeholder="이름 또는 전화번호 검색" autocomplete="off">
        <button class="search-btn" id="orderer-search-btn">🔍</button>
        <div class="dropdown" id="orderer-dropdown" style="display:none"></div>
      </div>
    </div>
    <div id="orderer-selected"></div>
  </div>

  <!-- 수령자 -->
  <div class="card">
    <h2>수령자</h2>
    <div class="field">
      <div class="toggle-row">
        <button class="toggle-btn active" id="recip-same">주문자와 동일</button>
        <button class="toggle-btn" id="recip-diff">다른 사람</button>
      </div>
    </div>
    <div id="recipient-wrap" style="display:none">
      <div class="field" id="recipient-search-field">
        <div class="search-box">
          <input type="text" id="recipient-input" placeholder="이름 또는 전화번호 검색" autocomplete="off">
          <button class="search-btn" id="recipient-search-btn">🔍</button>
          <div class="dropdown" id="recipient-dropdown" style="display:none"></div>
        </div>
      </div>
      <div id="recipient-selected" style="display:none"></div>
    </div>
  </div>

  <!-- 상품 -->
  <div class="card">
    <h2>상품</h2>
    <table class="items-table">
      <thead><tr><th>상품</th><th>단가</th><th>수량</th><th></th></tr></thead>
      <tbody id="items-body"></tbody>
    </table>
    <button class="btn-add-dashed" id="btn-add-item">+ 상품 추가</button>
  </div>

  <!-- 배송 -->
  <div class="card">
    <h2>배송</h2>
    <div class="field">
      <label>배송 방법</label>
      <div class="toggle-row">
        <button class="toggle-btn active" data-delivery="택배">택배</button>
        <button class="toggle-btn" data-delivery="현장수령">현장수령</button>
        <button class="toggle-btn" data-delivery="배달">배달</button>
      </div>
    </div>
    <div id="address-wrap">
      <div class="field">
        <label>배송 주소</label>
        <div id="address-list"></div>
        <div class="field" style="margin-top:8px">
          <div style="display:flex;gap:6px">
            <input type="text" id="new-address-input" placeholder="주소 검색 (예: 강남구 테헤란로 152)">
            <button class="btn btn-outline" id="btn-geocode-search" style="white-space:nowrap;padding:7px 12px">🔍 검색</button>
          </div>
          <div id="geocode-results" style="display:none;margin-top:6px;border:1px solid #e5e7eb;border-radius:8px;overflow:hidden;background:#fff"></div>
          <div id="address-detail-wrap" style="display:none;margin-top:6px">
            <div style="padding:7px 10px;background:#f8fafc;border:1px solid #e5e7eb;border-radius:7px;font-size:13px;color:#374151;margin-bottom:6px" id="address-base-display"></div>
            <input type="text" id="address-detail-input" placeholder="동/호수 등 세부주소 입력" style="width:100%;margin-bottom:6px">
          </div>
          <button class="btn-add-dashed" id="btn-add-address" style="margin-top:6px;display:none">+ 이 주소로 등록</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 금액 -->
  <div class="card">
    <h2>청구금액</h2>
    <div class="amount-box">
      <div class="amount-row"><span>상품금액</span><span id="sum-items">0원</span></div>
      <div class="amount-row">
        <span>택배비</span>
        <div class="toggle-row" style="margin:0">
          <button class="toggle-btn" id="shipping-on">있음 (5,000원)</button>
          <button class="toggle-btn active" id="shipping-off">없음</button>
        </div>
        <input type="hidden" id="shipping-fee" value="0">
      </div>
      <div class="amount-row total"><span>청구금액</span><span id="sum-total">0원</span></div>
    </div>
  </div>

  <!-- 기타 -->
  <div class="card">
    <h2>기타</h2>
    <div class="field">
      <label>우선순위</label>
      <div class="priority-row">
        <button class="priority-btn" data-p="1">1</button>
        <button class="priority-btn" data-p="2">2</button>
        <button class="priority-btn active" data-p="3">3</button>
        <button class="priority-btn" data-p="4">4</button>
        <button class="priority-btn" data-p="5">5</button>
      </div>
    </div>
    <div class="field" style="margin-top:14px">
      <label>메모</label>
      <textarea id="memo" rows="2"></textarea>
    </div>
  </div>

  <button class="btn-submit" id="btn-submit">수정 저장</button>
</div>

<script src="config.js"></script>
<script src="common.js"></script>
<script src="nav.js"></script>
<script>
const API = BB_CONFIG.API;
const PRODUCTS = BB_CONFIG.PRODUCTS;

const params = new URLSearchParams(location.search);
const orderId = params.get('id');

let order = null;
let orderer = null;
let recipient = null;
let recipientSame = true;
let deliveryType = '택배';
let selectedAddressId = null;
let activeAddressCustomerId = null;
let priority = 3;
let items = [];

// 주문번호 체커 (수정 시 자기 자신 제외)
let orderNoChecker = null;

async function loadOrder() {
  const res = await fetch(`${API}/api/orders/${orderId}`);
  order = await res.json();

  document.getElementById('page-title').textContent = `주문 #${order.order_no || order.id} 수정`;

  // 주문번호
  document.getElementById('order-no').value = order.order_no || '';
  orderNoChecker = setupOrderNoCheck('order-no', 'order-no-msg', orderId);
  orderNoChecker.setValid(true);

  // 주문자
  orderer = { id: order.orderer_id, name: order.orderer_name, phone: order.orderer_phone };
  renderSelectedCustomer('orderer-selected', orderer, () => {
    orderer = null;
    document.getElementById('orderer-search-wrap').style.display = '';
    document.getElementById('orderer-selected').innerHTML = '';
    document.getElementById('address-list').innerHTML = '';
    selectedAddressId = null;
  });

  // 수령자
  if (order.recipient_id) {
    recipientSame = false;
    recipient = { id: order.recipient_id, name: order.recipient_name, phone: order.recipient_phone };
    document.getElementById('recip-same').classList.remove('active');
    document.getElementById('recip-diff').classList.add('active');
    document.getElementById('recipient-wrap').style.display = '';
    document.getElementById('recipient-search-field').style.display = 'none';
    renderSelectedCustomer('recipient-selected', recipient, () => {
      recipient = null;
      document.getElementById('recipient-search-field').style.display = '';
      document.getElementById('recipient-selected').style.display = 'none';
      if (orderer && deliveryType !== '현장수령') {
        loadAddresses(orderer.id, (id) => { selectedAddressId = id; });
      }
    });
  }

  // 배송
  deliveryType = order.delivery_type;
  document.querySelectorAll('[data-delivery]').forEach(b => {
    b.classList.toggle('active', b.dataset.delivery === deliveryType);
  });
  document.getElementById('address-wrap').style.display = deliveryType !== '현장수령' ? '' : 'none';

  // 주소 — 수령자 다름이면 recipient 기준, 동일이면 orderer 기준
  selectedAddressId = order.address_id;
  if (deliveryType !== '현장수령') {
    const addrTarget = (!recipientSame && recipient) ? recipient : orderer;
    if (addrTarget) {
      const res2 = await fetch(`${API}/api/customers/${addrTarget.id}`);
      const data = await res2.json();
      renderAddresses(data.addresses || [], null, (id) => { selectedAddressId = id || order.address_id; });
      selectedAddressId = order.address_id;
      document.querySelectorAll('.addr-item').forEach(el => {
        el.classList.toggle('selected', +el.dataset.id === order.address_id);
      });
    }
  }

  // 상품
  items = order.items.map(i => ({ product: i.product, unit_price: i.unit_price, qty: i.qty }));
  renderItems(items, () => {
    calcAmount(items);
    autoShipping(items, deliveryType);
  });

  // 택배비
  document.getElementById('shipping-fee').value = order.shipping_fee;
  const hasFee = order.shipping_fee > 0;
  document.getElementById('shipping-on').classList.toggle('active', hasFee);
  document.getElementById('shipping-off').classList.toggle('active', !hasFee);
  calcAmount(items);

  // 우선순위
  priority = order.priority;
  document.querySelectorAll('.priority-btn').forEach(b => {
    b.classList.toggle('active', +b.dataset.p === priority);
  });

  // 메모
  document.getElementById('memo').value = order.memo || '';
}

// 주소목록을 올바른 고객(수령자 다름→recipient, 동일→orderer)에서 로드
async function refreshAddresses() {
  if (deliveryType === '현장수령') return;
  const target = (!recipientSame && recipient) ? recipient : (recipientSame && orderer) ? orderer : null;
  if (!target) { document.getElementById('address-list').innerHTML = ''; selectedAddressId = null; return; }
  activeAddressCustomerId = target.id;
  await loadAddresses(target.id, (id) => { selectedAddressId = id; });
}

// ── 주문자 검색 ───────────────────────────────────────
setupSearch('orderer-input', 'orderer-search-btn', 'orderer-dropdown', null, async (c) => {
  orderer = c;
  document.getElementById('orderer-search-wrap').style.display = 'none';
  renderSelectedCustomer('orderer-selected', c, () => {
    orderer = null;
    document.getElementById('orderer-search-wrap').style.display = '';
    document.getElementById('orderer-selected').innerHTML = '';
    document.getElementById('address-list').innerHTML = '';
    selectedAddressId = null;
  });
  await refreshAddresses();
});

// ── 수령자 검색 ───────────────────────────────────────
setupSearch('recipient-input', 'recipient-search-btn', 'recipient-dropdown', null, async (c) => {
  recipient = c;
  document.getElementById('recipient-search-field').style.display = 'none';
  renderSelectedCustomer('recipient-selected', c, () => {
    recipient = null;
    document.getElementById('recipient-search-field').style.display = '';
    document.getElementById('recipient-selected').style.display = 'none';
    refreshAddresses();
  });
  await refreshAddresses();
});

// 수령자 토글
document.getElementById('recip-same').addEventListener('click', () => {
  recipientSame = true;
  document.getElementById('recip-same').classList.add('active');
  document.getElementById('recip-diff').classList.remove('active');
  document.getElementById('recipient-wrap').style.display = 'none';
  refreshAddresses();
});
document.getElementById('recip-diff').addEventListener('click', () => {
  recipientSame = false;
  document.getElementById('recip-diff').classList.add('active');
  document.getElementById('recip-same').classList.remove('active');
  document.getElementById('recipient-wrap').style.display = '';
  refreshAddresses();
});

// ── 주소 Geocoding 검색 ───────────────────────────────
let geocodedAddress = null;

async function runGeocodeSearch() {
  const q = document.getElementById('new-address-input').value.trim();
  if (!q) return;
  const resultsEl = document.getElementById('geocode-results');
  const addBtn    = document.getElementById('btn-add-address');
  resultsEl.innerHTML = '<div style="padding:10px;font-size:13px;color:#6b7280">검색 중...</div>';
  resultsEl.style.display = '';
  addBtn.style.display = 'none';
  geocodedAddress = null;

  const res  = await fetch(`${API}/api/geocode?query=${encodeURIComponent(q)}`);
  const data = await res.json();
  const list = data.addresses || [];

  if (!list.length) {
    resultsEl.innerHTML = '<div style="padding:10px;font-size:13px;color:#dc2626">⚠️ 주소를 찾을 수 없습니다. 다시 입력해 주세요.</div>';
    return;
  }

  resultsEl.innerHTML = list.map((a, i) => `
    <div class="geocode-item" data-idx="${i}" style="padding:9px 12px;cursor:pointer;border-bottom:1px solid #f3f4f6;font-size:13px">
      <div style="font-weight:600;color:#111">${a.roadAddress || a.jibunAddress}</div>
      ${a.roadAddress && a.jibunAddress ? `<div style="font-size:11px;color:#9ca3af;margin-top:2px">${a.jibunAddress}</div>` : ''}
    </div>`).join('');

  resultsEl.querySelectorAll('.geocode-item').forEach(item => {
    item.addEventListener('mouseenter', () => item.style.background = '#f9fafb');
    item.addEventListener('mouseleave', () => item.style.background = '');
    item.addEventListener('click', () => {
      const a = list[+item.dataset.idx];
      geocodedAddress = a.roadAddress || a.jibunAddress;
      resultsEl.style.display = 'none';
      document.getElementById('address-base-display').textContent = geocodedAddress;
      document.getElementById('address-detail-wrap').style.display = '';
      document.getElementById('address-detail-input').value = '';
      document.getElementById('address-detail-input').focus();
      addBtn.style.display = '';
    });
  });
}

document.getElementById('btn-geocode-search').addEventListener('click', runGeocodeSearch);
document.getElementById('new-address-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); runGeocodeSearch(); }
});

// ── 주소 추가 ─────────────────────────────────────────
document.getElementById('btn-add-address').addEventListener('click', async () => {
  const detail = document.getElementById('address-detail-input').value.trim();
  const val = geocodedAddress ? (detail ? geocodedAddress + ' ' + detail : geocodedAddress) : '';
  if (!val || !activeAddressCustomerId) { showToast('주문자 또는 수령자를 먼저 선택하세요'); return; }
  await fetch(`${API}/api/addresses`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ customer_id: activeAddressCustomerId, address: val, is_default: 0 })
  });
  document.getElementById('new-address-input').value = '';
  document.getElementById('address-detail-input').value = '';
  document.getElementById('address-detail-wrap').style.display = 'none';
  document.getElementById('btn-add-address').style.display = 'none';
  geocodedAddress = null;
  await loadAddresses(activeAddressCustomerId, (id) => { selectedAddressId = id; });
  showToast('주소 추가됨');
});

// ── 배송방법 ──────────────────────────────────────────
document.querySelectorAll('[data-delivery]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-delivery]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    deliveryType = btn.dataset.delivery;
    document.getElementById('address-wrap').style.display = deliveryType !== '현장수령' ? '' : 'none';
    autoShipping(items, deliveryType);
  });
});

// ── 상품 ──────────────────────────────────────────────
document.getElementById('btn-add-item').addEventListener('click', () => {
  items.push({ product: PRODUCTS[1].name, unit_price: PRODUCTS[1].price, qty: 1 });
  renderItems(items, () => {
    calcAmount(items);
    autoShipping(items, deliveryType);
  });
});

document.getElementById('shipping-on').addEventListener('click', () => {
  document.getElementById('shipping-on').classList.add('active');
  document.getElementById('shipping-off').classList.remove('active');
  document.getElementById('shipping-fee').value = 5000;
  calcAmount(items);
});
document.getElementById('shipping-off').addEventListener('click', () => {
  document.getElementById('shipping-off').classList.add('active');
  document.getElementById('shipping-on').classList.remove('active');
  document.getElementById('shipping-fee').value = 0;
  calcAmount(items);
});

// ── 우선순위 ──────────────────────────────────────────
document.querySelectorAll('.priority-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.priority-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    priority = +btn.dataset.p;
  });
});

// ── 저장 ──────────────────────────────────────────────
document.getElementById('btn-submit').addEventListener('click', async () => {
  const orderNo = document.getElementById('order-no').value.trim();
  if (!orderNo)    { showToast('주문번호를 입력하세요'); return; }
  if (!orderNoChecker.isValid()) { showToast('⚠️ 중복된 주문번호입니다'); return; }
  if (!orderer)    { showToast('주문자를 선택하세요'); return; }
  if (!recipientSame && !recipient) { showToast('수령자를 선택하세요'); return; }
  if (!items.length) { showToast('상품을 추가하세요'); return; }
  if (deliveryType !== '현장수령' && !selectedAddressId) { showToast('배송 주소를 선택하세요'); return; }

  const btn = document.getElementById('btn-submit');
  btn.disabled = true;
  btn.textContent = '저장 중...';

  const body = {
    order_no:       orderNo,
    orderer_id:     orderer.id,
    recipient_id:   recipientSame ? null : recipient?.id,
    address_id:     deliveryType !== '현장수령' ? selectedAddressId : null,
    delivery_type:  deliveryType,
    priority,
    memo:           document.getElementById('memo').value,
    items,
    shipping_fee:   +document.getElementById('shipping-fee').value || 0,
    status:         order.status,
    payment_status: order.payment_status,
  };

  try {
    const res = await fetch(`${API}/api/orders/${orderId}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if (data.ok) {
      // 입금 연결 금액 자동 업데이트
      const newTotal = items.reduce((s, i) => s + i.unit_price * i.qty, 0) + (+document.getElementById('shipping-fee').value || 0);
      const oldTotal = order.total_amount;
      if (newTotal !== oldTotal) {
        const linksRes = await fetch(`${API}/api/orders/${orderId}/txn-links`);
        const links = await linksRes.json();
        for (const l of links) {
          if (l.amount === oldTotal) {
            await fetch(`${API}/api/txn-links/${l.id}`, {
              method: 'PUT',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ amount: newTotal })
            });
          }
        }
      }
      showToast('✅ 수정 완료');
      setTimeout(() => { window.location.href = `order-detail.html?id=${orderId}`; }, 1000);
    } else {
      showToast('오류: ' + (data.error || '알 수 없는 오류'));
      btn.disabled = false;
      btn.textContent = '수정 저장';
    }
  } catch (e) {
    showToast('오류: ' + e.message);
    btn.disabled = false;
    btn.textContent = '수정 저장';
  }
});

loadOrder();
</script>
</body>
</html>
