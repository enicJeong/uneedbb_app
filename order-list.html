<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주문 목록 — bb</title>
<link rel="stylesheet" href="style.css">
<style>
  .wrap { max-width: 1300px; }
  .top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }

  .desktop-table { display: none; }
  @media (min-width: 768px) {
    .mobile-list   { display: none; }
    .desktop-table { display: block; }
  }

  .print-chk { width: 16px; height: 16px; cursor: pointer; accent-color: #10b981; }
  .sel-chk   { display: none; }
  .row-sel-indicator {
    display: inline-block; width: 20px; height: 20px;
    border: 2px solid #d1d5db; border-radius: 5px;
    background: #fff; transition: all .15s; flex-shrink: 0;
  }
  tr.row-selected .row-sel-indicator {
    background: #111; border-color: #111;
  }
  tr.row-selected .row-sel-indicator::after {
    content: '✓'; display: block; text-align: center;
    color: #fff; font-size: 13px; font-weight: 900; line-height: 18px;
  }
  tr.row-selected {
    outline: 3px solid #111;
    outline-offset: -1px;
  }

  /* 하단 플로팅 바 */
  #bulk-bar {
    position: fixed; bottom: 56px; left: 50%; transform: translateX(-50%);
    background: #1e293b; color: #fff; border-radius: 12px;
    padding: 10px 16px; display: flex; align-items: center; gap: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,.3); z-index: 150;
    font-size: 13px; font-weight: 600; white-space: nowrap;
    transition: opacity .2s, transform .2s;
  }
  #bulk-bar.hidden { opacity: 0; pointer-events: none; transform: translateX(-50%) translateY(12px); }
  #bulk-bar .bar-count { color: #93c5fd; }
  #bulk-bar button {
    padding: 6px 14px; border-radius: 8px; border: none;
    font-size: 13px; font-weight: 700; cursor: pointer;
  }
  #bulk-bar .btn-prev { background: #334155; color: #cbd5e1; }
  #bulk-bar .btn-prev:hover { background: #475569; }
  #bulk-bar .btn-next { background: #2563eb; color: #fff; }
  #bulk-bar .btn-next:hover { background: #1d4ed8; }
  #bulk-bar .btn-cancel { background: none; border: none; color: #64748b; font-size: 18px; cursor: pointer; padding: 0 4px; }
  #bulk-bar .sms-toggle-wrap { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #64748b; border-left: 1px solid #334155; padding-left: 12px; }
  #bulk-bar .sms-toggle-wrap.on { color: #93c5fd; }
  #bulk-bar .toggle-switch { position: relative; width: 32px; height: 18px; cursor: pointer; }
  #bulk-bar .toggle-switch input { opacity: 0; width: 0; height: 0; }
  #bulk-bar .toggle-track { position: absolute; inset: 0; background: #475569; border-radius: 99px; transition: background .2s; }
  #bulk-bar .toggle-thumb { position: absolute; top: 2px; left: 2px; width: 14px; height: 14px; background: #fff; border-radius: 50%; transition: transform .2s; }
  #bulk-bar .toggle-switch input:checked ~ .toggle-track { background: #2563eb; }
  #bulk-bar .toggle-switch input:checked ~ .toggle-thumb { transform: translateX(14px); }

  /* 상품 배지 */
  .item-badges { display: flex; flex-wrap: wrap; gap: 4px; }
  .item-badge {
    display: inline-flex; align-items: center; gap: 3px;
    padding: 3px 8px; border-radius: 6px;
    font-size: 12px; font-weight: 700;
    white-space: nowrap;
  }
  .item-badge .qty {
    color: #fff; border-radius: 4px; padding: 0 5px;
    font-size: 11px; font-weight: 700; line-height: 18px;
  }

  /* 검색 */
  .search-row { display: flex; gap: 8px; margin-bottom: 12px; }
  .search-row input {
    flex: 1; padding: 8px 12px; border: 1px solid #d1d5db; border-radius: 8px;
    font-size: 13px; outline: none;
  }
  .search-row input:focus { border-color: #2563eb; }
  .search-count { font-size: 12px; color: #9ca3af; align-self: center; white-space: nowrap; }
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <h1 style="font-size:20px;font-weight:700">📋 주문 목록</h1>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-outline" id="btn-dl-excel">📥 엑셀 다운</button>
      <button class="btn btn-outline" id="btn-excel">📦 택배사엑셀</button>
      <a href="order-new.html"><button class="btn btn-primary">+ 새 주문</button></a>
    </div>
  </div>

  <div class="summary">
    <div class="summary-card"><div class="num" id="cnt-주문입력">-</div><div class="label">주문입력</div></div>
    <div class="summary-card"><div class="num" id="cnt-주문확정">-</div><div class="label">주문확정</div></div>
    <div class="summary-card"><div class="num" id="cnt-주문출력">-</div><div class="label">주문출력</div></div>
    <div class="summary-card"><div class="num" id="cnt-송장출력">-</div><div class="label">송장출력</div></div>
    <div class="summary-card"><div class="num" id="cnt-배송완료">-</div><div class="label">배송완료</div></div>
    <div class="summary-card"><div class="num" id="cnt-수금완료">-</div><div class="label">수금완료</div></div>
  </div>

  <div class="filter-row">
    <button class="filter-btn active" data-filter="">전체</button>
    <button class="filter-btn" data-filter="주문입력">주문입력</button>
    <button class="filter-btn" data-filter="주문확정">주문확정</button>
    <button class="filter-btn" data-filter="주문출력">주문출력</button>
    <button class="filter-btn" data-filter="송장출력">송장출력</button>
    <button class="filter-btn" data-filter="배송완료">배송완료</button>
    <button class="filter-btn" data-filter="수금완료">수금완료</button>
  </div>

  <div class="search-row">
    <div style="display:flex;gap:0;border:2px solid #111;border-radius:8px;overflow:hidden;flex-shrink:0">
      <button id="mode-select" class="mode-btn" style="padding:6px 14px;font-size:12px;font-weight:700;border:none;background:#111;color:#fff;cursor:pointer">☑ 선택</button>
      <button id="mode-detail" class="mode-btn" style="padding:6px 14px;font-size:12px;font-weight:700;border:none;background:#fff;color:#111;cursor:pointer">→ 상세</button>
    </div>
    <input type="text" id="search-input" placeholder="주문번호, 주문자, 수령자, 주소, 메모, 송장번호 검색...">
    <span class="search-count" id="search-count"></span>
  </div>

  <!-- 모바일 카드 -->
  <div class="mobile-list" id="mobile-list"></div>

  <!-- 데스크탑 테이블 -->
  <div class="desktop-table">
    <table class="tbl">
      <thead>
        <tr>
          <th style="width:32px;text-align:center"><input type="checkbox" class="sel-chk" id="chk-all" style="display:none"></th>
          <th>주문번호</th>
          <th>접수일</th>
          <th>진행</th>
          <th>주문서</th>
          <th>주문자</th>
          <th>메모</th>
          <th>수령자</th>
          <th>상품</th>
          <th>배송</th>
          <th>주소</th>
          <th>택배송장</th>
          <th>수금</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="desktop-tbody"></tbody>
    </table>
  </div>

  <div id="empty-msg" style="display:none" class="empty">해당하는 주문이 없습니다</div>
</div>

<!-- 하단 플로팅 바 -->
<div id="bulk-bar" class="hidden">
  <span class="bar-count" id="bar-count">0건 선택</span>
  <button class="btn-prev" id="btn-bulk-prev">← 이전단계</button>
  <button class="btn-next" id="btn-bulk-next">다음단계 →</button>
  <button id="btn-bulk-del" style="padding:6px 14px;border-radius:8px;border:none;background:#dc2626;color:#fff;font-size:13px;font-weight:700;cursor:pointer">🗑 삭제</button>
  <label class="sms-toggle-wrap" id="list-sms-wrap" title="주문확정 시 문자 발송">
    <label class="toggle-switch">
      <input type="checkbox" id="list-sms-toggle">
      <div class="toggle-track"></div>
      <div class="toggle-thumb"></div>
    </label>
    <span id="list-sms-label">문자 OFF</span>
  </label>
  <button class="btn-cancel" id="btn-bulk-cancel" title="선택 해제">✕</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="config.js"></script>
<script src="common.js"></script>
<script src="nav.js"></script>
<script>
const API = BB_CONFIG.API;
let allOrders = [];
let currentFilter = '';
let rowMode = 'select'; // 'select' | 'detail'
let searchQuery = '';

async function loadOrders() {
  const res = await fetch(`${API}/api/orders`);
  allOrders = await res.json();
  updateSummary();
  renderOrders();
}

const BADGE_COLORS = [
  { bg: '#eff6ff', border: '#bfdbfe', text: '#1d4ed8', qty: '#1d4ed8' },
  { bg: '#fef9c3', border: '#fde047', text: '#854d0e', qty: '#854d0e' },
  { bg: '#dcfce7', border: '#86efac', text: '#15803d', qty: '#15803d' },
  { bg: '#fce7f3', border: '#f9a8d4', text: '#9d174d', qty: '#9d174d' },
  { bg: '#f3e8ff', border: '#d8b4fe', text: '#6b21a8', qty: '#6b21a8' },
  { bg: '#ffedd5', border: '#fdba74', text: '#9a3412', qty: '#9a3412' },
  { bg: '#e0f2fe', border: '#7dd3fc', text: '#0369a1', qty: '#0369a1' },
  { bg: '#f1f5f9', border: '#94a3b8', text: '#334155', qty: '#334155' },
];
const productColorMap = {};
let productColorIdx = 0;

function getProductColor(name) {
  if (!productColorMap[name]) {
    productColorMap[name] = BADGE_COLORS[productColorIdx % BADGE_COLORS.length];
    productColorIdx++;
  }
  return productColorMap[name];
}

function itemBadges(summary) {
  if (!summary) return '<span style="color:#d1d5db">—</span>';
  return '<div class="item-badges">' +
    summary.split(', ').map(part => {
      const [name, qty] = part.split('*');
      const c = getProductColor(name || part);
      return `<span class="item-badge" style="background:${c.bg};border:1px solid ${c.border};color:${c.text}">${name || part}${qty ? ` <span class="qty" style="background:${c.qty}">${qty}</span>` : ''}</span>`;
    }).join('') +
  '</div>';
}

function updateSummary() {
  ['주문입력','주문확정','주문출력','송장출력','배송완료','수금완료'].forEach(s => {
    document.getElementById('cnt-' + s).textContent = allOrders.filter(o => o.status === s).length;
  });
}

function getFiltered() {
  let list = currentFilter ? allOrders.filter(o => o.status === currentFilter) : allOrders;
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter(o => [
      o.order_no, o.orderer_name, o.orderer_phone,
      o.recipient_name, o.recipient_phone,
      o.address, o.memo, o.tracking_no
    ].some(v => v && String(v).toLowerCase().includes(q)));
  }
  return list;
}

async function togglePrinted(e, orderId, current) {
  e.stopPropagation();
  await fetch(`${API}/api/orders/${orderId}/printed`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ printed: current ? 0 : 1 })
  });
  await loadOrders();
}

function renderOrders() {
  const filtered = getFiltered();
  const empty = document.getElementById('empty-msg');
  document.getElementById('search-count').textContent =
    searchQuery ? `${filtered.length}건` : '';

  if (!filtered.length) {
    document.getElementById('mobile-list').innerHTML = '';
    document.getElementById('desktop-tbody').innerHTML = '';
    empty.style.display = '';
    return;
  }
  empty.style.display = 'none';

  // ── 모바일 카드 ──
  const mobileList = document.getElementById('mobile-list');
  mobileList.innerHTML = '';
  filtered.forEach(o => {
    const card = document.createElement('div');
    card.className = `order-card status-${o.status}`;
    const recipientText = o.recipient_name ? `<span class="recipient">→ ${o.recipient_name}</span>` : '';
    const priorityClass = o.priority <= 2 ? ' high' : '';
    const date = (o.created_at || '').slice(2, 10);
    card.innerHTML = `
      <div class="order-top">
        <span class="order-id">${o.order_no || '#' + o.id} · ${date}</span>
        <div class="badges">
          <span class="badge badge-p${priorityClass}">P${o.priority}</span>
          <span class="badge badge-${o.status}">${o.status}</span>
          <span class="badge badge-${o.payment_status}">${o.payment_status}</span>
        </div>
      </div>
      <div class="order-names">${o.orderer_name}${recipientText}</div>
      ${o.items_summary ? `<div style="margin:4px 0">${itemBadges(o.items_summary)}</div>` : ''}
      <div class="order-info">
        <span class="badge badge-${o.delivery_type}">${o.delivery_type}</span>
        ${o.address ? `<span>${o.address}</span>` : ''}
        <span class="order-amount">${o.total_amount.toLocaleString()}원</span>
      </div>
      ${o.memo ? `<div class="order-memo">${o.memo}</div>` : ''}`;
    card.addEventListener('click', () => { window.location.href = `order-detail.html?id=${o.id}`; });
    mobileList.appendChild(card);
  });

  // ── 데스크탑 테이블 ──
  const tbody = document.getElementById('desktop-tbody');
  tbody.innerHTML = '';
  filtered.forEach(o => {
    const date = (o.created_at || '').slice(2, 10);
    const priorityClass = o.priority <= 2 ? ' high' : '';
    const printed = !!o.printed_at;
    const tr = document.createElement('tr');
    tr.className = `status-${o.status}`;
    tr.innerHTML = `
      <td style="text-align:center;width:32px">
        <input type="checkbox" class="sel-chk row-chk" data-id="${o.id}" data-status="${o.status}">
        <span class="row-sel-indicator"></span>
      </td>
      <td class="order-no">${o.order_no || '#' + o.id}</td>
      <td style="color:#9ca3af;white-space:nowrap">${date}</td>
      <td><span class="badge badge-${o.status}">${o.status}</span></td>
      <td style="text-align:center">
        <input type="checkbox" class="print-chk" ${printed ? 'checked' : ''} data-id="${o.id}" data-printed="${printed ? 1 : 0}">
      </td>
      <td class="names">
        ${o.orderer_name}
        <div style="font-size:11px;color:#9ca3af">${formatPhone(o.orderer_phone)}</div>
        ${o.orderer_memo ? `<div style="font-size:11px;color:#f59e0b;font-weight:600">📝 ${o.orderer_memo}</div>` : ''}
      </td>
      <td class="memo-cell">${o.memo || ''}</td>
      <td class="names">
        ${o.recipient_name
          ? `${o.recipient_name}<div class="recip">${formatPhone(o.recipient_phone)}</div>${o.recipient_memo ? `<div style="font-size:11px;color:#f59e0b;font-weight:600">📝 ${o.recipient_memo}</div>` : ''}`
          : '<span style="color:#d1d5db">—</span>'}
      </td>
      <td>${itemBadges(o.items_summary)}</td>
      <td><span class="badge badge-${o.delivery_type}">${o.delivery_type}</span></td>
      <td class="addr-cell">${o.address || '-'}</td>
      <td style="white-space:nowrap;font-size:12px;color:#6b7280">
        ${o.tracking_no
          ? `<a href="https://www.ilogen.com/m/personal/trace/${o.tracking_no.replace(/-/g,'')}" target="_blank" style="color:#2563eb;text-decoration:none">${o.tracking_no}</a>`
          : ''}
      </td>
      <td><span class="badge badge-${o.payment_status}">${o.payment_status}</span></td>
      <td style="text-align:center;white-space:nowrap">
        <button class="btn-detail" data-id="${o.id}" style="padding:4px 10px;font-size:12px;border:1px solid #d1d5db;border-radius:6px;background:#fff;color:#374151;cursor:pointer;white-space:nowrap">상세 →</button>
      </td>`;
    tr.querySelector('.print-chk').addEventListener('click', (e) => {
      e.stopPropagation();
      togglePrinted(e, o.id, printed);
    });
    tr.querySelector('.btn-detail').addEventListener('click', (e) => {
      e.stopPropagation();
      window.location.href = `order-detail.html?id=${o.id}`;
    });
    tr.addEventListener('click', (e) => {
      if (e.target.type === 'checkbox' || e.target.closest('a') || e.target.closest('.btn-detail')) return;
      if (rowMode === 'detail') {
        window.location.href = `order-detail.html?id=${o.id}`;
      } else {
        const chk = tr.querySelector('.row-chk');
        chk.checked = !chk.checked;
        tr.classList.toggle('row-selected', chk.checked);
        updateBulkBar();
      }
    });
    tbody.appendChild(tr);
  });
}

// ── 상태 필터 ─────────────────────────────────────────
// ── 행 모드 토글 ──────────────────────────────────────
document.getElementById('mode-select').addEventListener('click', () => {
  rowMode = 'select';
  document.getElementById('mode-select').style.background = '#111';
  document.getElementById('mode-select').style.color = '#fff';
  document.getElementById('mode-detail').style.background = '#fff';
  document.getElementById('mode-detail').style.color = '#111';
});
document.getElementById('mode-detail').addEventListener('click', () => {
  rowMode = 'detail';
  document.getElementById('mode-detail').style.background = '#111';
  document.getElementById('mode-detail').style.color = '#fff';
  document.getElementById('mode-select').style.background = '#fff';
  document.getElementById('mode-select').style.color = '#111';
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderOrders();
  });
});

// ── 검색 ─────────────────────────────────────────────
let searchTimer = null;
document.getElementById('search-input').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    searchQuery = e.target.value.trim();
    renderOrders();
  }, 200);
});

// ── 엑셀 다운 (현재 필터 기준) ───────────────────────
document.getElementById('btn-dl-excel').addEventListener('click', () => {
  const filtered = getFiltered();
  if (!filtered.length) { showToast('다운로드할 데이터가 없습니다'); return; }

  const label = currentFilter || '전체';
  const header = ['주문번호','접수일','진행','주문자','주문자전화','메모','수령자','수령자전화','배송방법','주소','택배송장','청구금액','수금','P'];
  const dataRows = filtered.map(o => [
    o.order_no || '',
    (o.created_at || '').slice(0, 10),
    o.status,
    o.orderer_name || '',
    o.orderer_phone || '',
    o.memo || '',
    o.recipient_name || '',
    o.recipient_phone || '',
    o.delivery_type || '',
    o.address || '',
    o.tracking_no || '',
    o.total_amount || 0,
    o.payment_status || '',
    o.priority || '',
  ]);

  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet([header, ...dataRows]);
  ws['!cols'] = [10,10,8,10,12,12,10,12,8,20,14,10,8,4].map(w => ({ wch: w }));
  XLSX.utils.book_append_sheet(wb, ws, label);
  XLSX.writeFile(wb, `주문목록_${label}_${new Date().toISOString().slice(0,10)}.xlsx`);
  showToast(`✅ ${filtered.length}건 엑셀 저장됨`);
});

// ── 택배사 엑셀 (송장출력 상태) ──────────────────────
document.getElementById('btn-excel').addEventListener('click', async () => {
  const res = await fetch(`${API}/api/orders/export?status=송장출력`);
  const orders = await res.json();
  if (!orders.length) { showToast('송장출력 상태 주문이 없습니다'); return; }

  const header = ['수하인명','','수하인주소','수하인전화번호','수하인핸드폰번호','택배수량','택배운임','운임구분','품목명','','배송메세지'];
  const dataRows = orders.map(o => {
    const name  = o.recipient_name  || o.orderer_name;
    const phone = o.recipient_phone || o.orderer_phone;
    return [name, '', o.address || '', phone, phone, 1, 5000, '010', o.order_no || '', '', '생물,파손주의'];
  });

  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet([header, ...dataRows]);
  XLSX.utils.book_append_sheet(wb, ws, '엑셀파일첫행-제목있음');
  XLSX.writeFile(wb, `송장출력_${new Date().toISOString().slice(0,10)}.xls`);

  await fetch(`${API}/api/sms-queue`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      phone: '01088677298',
      message: `저희 오늘 택배 ${orders.length}건 올려두었습니다.`
    })
  });

  showToast(`✅ ${orders.length}건 엑셀 저장됨 · 문자 등록됨`);
});

// ── 전체선택 ──────────────────────────────────────────
document.getElementById('chk-all').addEventListener('click', (e) => {
  document.querySelectorAll('.row-chk').forEach(chk => {
    chk.checked = e.target.checked;
    chk.closest('tr').classList.toggle('row-selected', e.target.checked);
  });
  updateBulkBar();
});

// ── 플로팅 바 ─────────────────────────────────────────
const STATUSES = ['주문입력','주문확정','주문출력','송장출력','배송완료','수금완료'];

function getSelected() {
  return [...document.querySelectorAll('.row-chk:checked')].map(chk => ({
    id: chk.dataset.id,
    status: chk.dataset.status,
  }));
}

function updateBulkBar() {
  const selected = getSelected();
  const bar = document.getElementById('bulk-bar');
  if (!selected.length) { bar.classList.add('hidden'); return; }
  bar.classList.remove('hidden');
  document.getElementById('bar-count').textContent = `${selected.length}건 선택`;

  const statusCounts = {};
  selected.forEach(s => { statusCounts[s.status] = (statusCounts[s.status] || 0) + 1; });
  const dominant = Object.entries(statusCounts).sort((a, b) => b[1] - a[1])[0][0];
  const idx = STATUSES.indexOf(dominant);

  const btnPrev = document.getElementById('btn-bulk-prev');
  const btnNext = document.getElementById('btn-bulk-next');
  btnPrev.textContent = idx > 0 ? `← ${STATUSES[idx - 1]}` : '← 이전단계';
  btnNext.textContent = idx < STATUSES.length - 1 ? `${STATUSES[idx + 1]} →` : '다음단계 →';
  btnPrev.disabled = idx === 0;
  btnNext.disabled = idx === STATUSES.length - 1;
}

async function bulkChangeStatus(direction) {
  const selected = getSelected();
  if (!selected.length) return;

  const btn = direction === 'next' ? document.getElementById('btn-bulk-next') : document.getElementById('btn-bulk-prev');
  btn.disabled = true;
  btn.textContent = '처리 중...';

  let ok = 0;
  for (const { id, status } of selected) {
    const idx = STATUSES.indexOf(status);
    const nextIdx = direction === 'next' ? idx + 1 : idx - 1;
    if (nextIdx < 0 || nextIdx >= STATUSES.length) continue;
    const newStatus = STATUSES[nextIdx];
    const smsOn = document.getElementById('list-sms-toggle').checked;
    const endpoint = (newStatus === '주문확정' && smsOn)
      ? `${API}/api/orders/${id}/confirm`
      : `${API}/api/orders/${id}/status`;
    await fetch(endpoint, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: newStatus }),
    });
    ok++;
  }

  showToast(`✅ ${ok}건 처리 완료`);
  document.getElementById('bulk-bar').classList.add('hidden');
  await loadOrders();
}

// ── SMS 토글 (localStorage 공유) ─────────────────────
const listSmsToggle = document.getElementById('list-sms-toggle');
const listSmsLabel  = document.getElementById('list-sms-label');
const listSmsWrap   = document.getElementById('list-sms-wrap');

function applyListSmsToggle() {
  const on = listSmsToggle.checked;
  listSmsLabel.textContent = on ? '문자 ON' : '문자 OFF';
  listSmsWrap.classList.toggle('on', on);
  localStorage.setItem('sms_send_enabled', on ? '1' : '0');
}
listSmsToggle.checked = localStorage.getItem('sms_send_enabled') === '1';
applyListSmsToggle();
listSmsToggle.addEventListener('change', applyListSmsToggle);

document.getElementById('btn-bulk-next').addEventListener('click', () => bulkChangeStatus('next'));
document.getElementById('btn-bulk-prev').addEventListener('click', () => bulkChangeStatus('prev'));
document.getElementById('btn-bulk-del').addEventListener('click', async () => {
  const selected = getSelected();
  if (!selected.length) return;
  if (!confirm(`선택한 ${selected.length}건을 삭제할까요?\n삭제된 주문은 목록에서 숨겨집니다.`)) return;
  for (const { id } of selected) {
    await fetch(`${API}/api/orders/${id}`, { method: 'DELETE' });
  }
  showToast(`🗑 ${selected.length}건 삭제됨`);
  document.getElementById('bulk-bar').classList.add('hidden');
  await loadOrders();
});
document.getElementById('btn-bulk-cancel').addEventListener('click', () => {
  document.querySelectorAll('.row-chk').forEach(chk => { chk.checked = false; });
  document.getElementById('chk-all').checked = false;
  document.getElementById('bulk-bar').classList.add('hidden');
});

loadOrders();

document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') loadOrders();
});
window.addEventListener('pageshow', (e) => {
  if (e.persisted) loadOrders();
});
</script>
</body>
