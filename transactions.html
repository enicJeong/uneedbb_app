<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>입출금기록 — bb</title>
<link rel="stylesheet" href="style.css">
<style>
  .wrap { max-width: 900px; }
  .top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }

  /* 붙여넣기 영역 */
  .paste-area { margin-bottom: 16px; }
  .paste-area textarea {
    width: 100%; height: 100px; padding: 10px; font-size: 12px; font-family: monospace;
    border: 2px dashed #d1d5db; border-radius: 10px; resize: vertical; box-sizing: border-box;
  }
  .paste-area textarea:focus { outline: none; border-color: #2563eb; }
  .paste-btns { display: flex; gap: 8px; margin-top: 6px; }

  /* 테이블 목록 */
  .txn-table { width: 100%; border-collapse: collapse; }
  .txn-table thead th {
    font-size: 11px; font-weight: 700; color: #6b7280;
    padding: 7px 10px; border-bottom: 2px solid #e5e7eb;
    text-align: right; background: #f9fafb; white-space: nowrap;
  }
  .txn-table thead th:first-child,
  .txn-table thead th:nth-child(2),
  .txn-table thead th:nth-child(3) { text-align: left; }
  .txn-table tbody tr { border-bottom: 1px solid #f3f4f6; cursor: pointer; }
  .txn-table tbody tr:hover { background: #f9fafb; }
  .txn-table tbody tr.withdraw-row { background: #fafafa; }
  .txn-table tbody tr.withdraw-row:hover { background: #f3f4f6; }
  .txn-table td { padding: 9px 10px; font-size: 13px; vertical-align: middle; }
  .txn-date { font-size: 11px; color: #9ca3af; white-space: nowrap; }
  .txn-memo { font-weight: 700; }
  .txn-desc { font-size: 11px; color: #9ca3af; }
  .txn-amount { font-size: 14px; font-weight: 800; text-align: right; white-space: nowrap; }
  .txn-amount.deposit { color: #15803d; }
  .txn-amount.withdraw { color: #dc2626; }
  .txn-balance { font-size: 12px; color: #374151; text-align: right; white-space: nowrap; }
  .txn-status-td { text-align: center; }
  /* 서브 패널 — spans full row */
  .txn-sub-tr td { padding: 0; }
  .txn-sub-tr { display: none; }
  .txn-sub-tr.open { display: table-row; }

  .link-badge {
    font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 99px;
    white-space: nowrap; flex-shrink: 0;
  }
  .badge-완료  { background: #dcfce7; color: #15803d; border: 1px solid #86efac; }
  .badge-확인중 { background: #fef9c3; color: #854d0e; border: 1px solid #fde047; }
  .badge-미연결 { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
  .badge-기타  { background: #f3f4f6; color: #6b7280; border: 1px solid #d1d5db; }

  /* 서브 패널 */
  .txn-sub { border-top: 1px solid #f3f4f6; padding: 10px 14px; }

  .link-row {
    display: flex; align-items: center; gap: 8px;
    padding: 5px 0; border-bottom: 1px solid #f3f4f6; font-size: 13px;
  }
  .link-row:last-child { border-bottom: none; }
  .link-order-no { font-weight: 700; color: #1d4ed8; min-width: 100px; }
  .link-name { color: #6b7280; flex: 1; }
  .link-amount { font-weight: 700; color: #15803d; white-space: nowrap; }
  .link-del { background: none; border: none; color: #fca5a5; cursor: pointer; font-size: 14px; padding: 0 4px; }
  .link-del:hover { color: #dc2626; }

  .unallocated {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 8px; padding: 6px 10px; border-radius: 7px;
    background: #fef9c3; font-size: 13px; font-weight: 700; color: #854d0e;
  }
  .unallocated.zero { background: #dcfce7; color: #15803d; }

  .sub-actions { display: flex; gap: 6px; margin-top: 10px; }

  .admin-memo-wrap { margin-top: 8px; display: flex; gap: 6px; align-items: center; }
  .admin-memo-input {
    flex: 1; padding: 5px 8px; border: 1px solid #d1d5db; border-radius: 7px;
    font-size: 12px; color: #374151;
  }
  .admin-memo-input:focus { outline: none; border-color: #2563eb; }
  .memo-save-btn { padding: 5px 10px; border-radius: 7px; border: 1px solid #d1d5db;
    background: #f9fafb; font-size: 12px; cursor: pointer; font-weight: 600; }
  .memo-save-btn:hover { background: #f3f4f6; }

  /* 모달 */
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 200;
    display: flex; align-items: center; justify-content: center; }
  .modal-box { background: #fff; border-radius: 14px; padding: 24px;
    width: 100%; max-width: 500px; max-height: 80vh; overflow-y: auto;
    box-shadow: 0 8px 32px rgba(0,0,0,.18); }
  .modal-box h3 { font-size: 16px; font-weight: 700; margin-bottom: 14px; }
  .modal-search { display: flex; gap: 6px; margin-bottom: 12px; }
  .modal-search input { flex: 1; padding: 8px 10px; border: 1px solid #d1d5db;
    border-radius: 8px; font-size: 13px; }
  .modal-search input:focus { outline: none; border-color: #2563eb; }
  .order-result { max-height: 200px; overflow-y: auto; border: 1px solid #e5e7eb;
    border-radius: 8px; margin-bottom: 12px; }
  .order-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px;
    border-bottom: 1px solid #f3f4f6; cursor: pointer; font-size: 13px; }
  .order-item:last-child { border-bottom: none; }
  .order-item:hover { background: #f9fafb; }
  .order-item input[type=checkbox] { accent-color: #2563eb; }
  .order-no-label { font-weight: 700; color: #1d4ed8; min-width: 100px; }
  .order-name-label { color: #374151; font-weight: 600; }
  .order-recipient-label { color: #9ca3af; font-size: 11px; }
  .order-names-wrap { flex: 1; display: flex; align-items: center; gap: 4px; }
  .order-amt-label { color: #374151; font-weight: 600; white-space: nowrap; }

  .selected-orders { margin-bottom: 12px; }
  .sel-order-row { display: flex; align-items: center; gap: 8px; padding: 5px 0;
    border-bottom: 1px solid #f3f4f6; font-size: 13px; }
  .sel-order-row input[type=number] { width: 110px; padding: 4px 6px; border: 1px solid #d1d5db;
    border-radius: 6px; font-size: 13px; text-align: right; }
  .remain-info { padding: 8px 10px; border-radius: 8px; font-size: 13px; font-weight: 700;
    margin-bottom: 12px; }
  .remain-info.ok  { background: #dcfce7; color: #15803d; }
  .remain-info.err { background: #fee2e2; color: #991b1b; }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }

  /* 필터 */
  .status-filter { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
  .status-filter button {
    padding: 5px 14px; border-radius: 99px; border: 1px solid #e5e7eb;
    background: #f9fafb; font-size: 12px; font-weight: 600; cursor: pointer; color: #6b7280;
  }
  .status-filter button.active { background: #2563eb; color: #fff; border-color: #2563eb; }

  /* 합계 행 */
  .txn-total-row td { padding: 8px 10px; font-size: 12px; font-weight: 700;
    background: #f3f4f6; border-top: 2px solid #e5e7eb; }
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <h1 style="font-size:20px;font-weight:700">💰 입출금기록</h1>
    <button class="btn btn-outline" id="btn-refresh">↺ 새로고침</button>
  </div>

  <div style="font-size:12px;color:#6b7280;margin-bottom:10px">
    입출금 데이터 입력은 <a href="order-bulk.html#txn" style="color:#2563eb;font-weight:700">일괄 작업 → 입출금 탭</a>에서 하세요.
  </div>

  <div class="status-filter">
    <button class="active" data-filter="">전체</button>
    <button data-filter="미연결">미연결</button>
    <button data-filter="확인중">확인중</button>
    <button data-filter="완료">완료</button>
    <button data-filter="기타">기타</button>
  </div>

  <table class="txn-table" id="txn-table">
    <thead>
      <tr>
        <th>거래일시</th>
        <th>거래기록사항</th>
        <th>거래내용</th>
        <th>출금</th>
        <th>입금</th>
        <th>잔액</th>
        <th>상태</th>
      </tr>
    </thead>
    <tbody id="txn-list"></tbody>
  </table>
</div>

<!-- 주문 연결 모달 -->
<div class="modal-bg" id="modal-bg" style="display:none">
  <div class="modal-box">
    <h3>🔗 주문 연결</h3>
    <div style="font-size:12px;color:#6b7280;margin-bottom:10px" id="modal-txn-info"></div>

    <div class="modal-search">
      <input type="text" id="order-search" placeholder="주문번호 또는 고객명 검색">
      <button class="btn btn-outline" id="btn-order-search" style="white-space:nowrap">검색</button>
    </div>
    <div class="order-result" id="order-result"></div>

    <div class="selected-orders" id="selected-orders" style="display:none">
      <div style="font-size:12px;color:#6b7280;font-weight:600;margin-bottom:6px">선택된 주문 — 배분금액 입력</div>
      <div id="sel-order-list"></div>
      <button class="btn btn-outline" id="btn-zero-adjust" style="margin-top:8px;font-size:12px;display:none">0으로 맞추기</button>
    </div>

    <div class="remain-info" id="remain-info" style="display:none"></div>

    <div class="modal-btns">
      <button class="btn btn-outline" id="modal-cancel">취소</button>
      <button class="btn btn-outline" id="modal-force-complete" style="display:none">강제 완료</button>
      <button class="btn btn-success" id="modal-confirm" disabled>수금완료 처리</button>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script src="common.js"></script>
<script src="nav.js"></script>
<script>
const API = BB_CONFIG.API;
let allTxns = [];
let currentTxn = null;
let selectedOrders = {};
let statusFilter = '';

// ── 상태 계산 ─────────────────────────────────────────
function calcStatus(t) {
  if (!t.deposit) return null;
  if (t.txn_status === '기타') return '기타';
  if (t.txn_status === '완료') return '완료';
  const linked = t.linked_amount || 0;
  if (linked === 0) return '미연결';
  if (linked >= t.deposit) return '완료';
  return '확인중';
}

const BADGE_CLS = { '미연결': 'badge-미연결', '확인중': 'badge-확인중', '완료': 'badge-완료', '기타': 'badge-기타' };

// ── 로드 ──────────────────────────────────────────────
async function load() {
  const res = await fetch(`${API}/api/transactions`);
  allTxns = await res.json();
  render();
}

function fmtAmt(n) { return (n || 0).toLocaleString() + '원'; }

function render() {
  const tbody = document.getElementById('txn-list');
  const visible = statusFilter
    ? allTxns.filter(t => calcStatus(t) === statusFilter)
    : allTxns;

  if (!visible.length) {
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:24px;color:#9ca3af">기록이 없습니다</td></tr>';
    renderTotals([]);
    return;
  }
  tbody.innerHTML = '';
  visible.forEach(t => {
    const isDeposit = t.deposit > 0;
    const status = calcStatus(t);
    const remain = t.deposit - (t.linked_amount || 0);

    const badgeHtml = status ? `<span class="link-badge ${BADGE_CLS[status]||''}">${status}</span>` : '';

    const linksHtml = (t.links || []).map(l => `
      <div class="link-row">
        <span class="link-order-no">${l.order_no}</span>
        <span class="link-name">${l.orderer_name || ''}</span>
        <span class="link-amount">${fmtAmt(l.amount)}</span>
        <button class="link-del" data-link-id="${l.id}" data-txn-id="${t.id}">✕</button>
      </div>`).join('');

    const unallocHtml = isDeposit ? `
      <div class="unallocated ${remain <= 0 ? 'zero' : ''}">
        <span>미배분 잔액</span><span>${fmtAmt(remain)}</span>
      </div>` : '';

    const tr = document.createElement('tr');
    tr.className = isDeposit ? '' : 'withdraw-row';
    tr.dataset.id = t.id;
    tr.innerHTML = `
      <td class="txn-date">${(t.txn_at||'').slice(0,16)}</td>
      <td class="txn-memo">${t.memo || '-'}<br><span class="txn-desc">${t.description || ''}</span></td>
      <td class="txn-desc">${t.admin_memo ? '📝 ' + t.admin_memo : ''}</td>
      <td class="txn-amount withdraw">${isDeposit ? '' : fmtAmt(t.withdraw)}</td>
      <td class="txn-amount deposit">${isDeposit ? fmtAmt(t.deposit) : ''}</td>
      <td class="txn-balance">${fmtAmt(t.balance)}</td>
      <td class="txn-status-td">${badgeHtml}</td>`;
    tbody.appendChild(tr);

    const subTr = document.createElement('tr');
    subTr.className = 'txn-sub-tr';
    subTr.id = `sub-tr-${t.id}`;
    subTr.innerHTML = `<td colspan="7"><div class="txn-sub" id="sub-${t.id}">
        ${linksHtml}
        ${unallocHtml}
        ${t.adjust_memo ? `<div style="font-size:12px;color:#6b7280;margin-top:4px">기타처리: ${t.adjust_memo}</div>` : ''}
        <div class="admin-memo-wrap">
          <span style="font-size:12px;color:#9ca3af;white-space:nowrap">📝 메모</span>
          <input class="admin-memo-input" id="memo-${t.id}" value="${t.admin_memo || ''}" placeholder="관리자 메모">
          <button class="memo-save-btn" data-txn-id="${t.id}">저장</button>
        </div>
        ${isDeposit ? `<div class="sub-actions">
          <button class="btn btn-primary btn-link-order" data-txn-id="${t.id}" style="font-size:13px;padding:6px 14px">+ 주문 연결</button>
          ${status !== '완료' ? `<button class="btn btn-outline btn-force-complete" data-txn-id="${t.id}" style="font-size:13px;padding:6px 14px;color:#15803d;border-color:#86efac">✅ 완료 처리</button>` : ''}
          <button class="btn btn-outline btn-del-txn" data-txn-id="${t.id}" style="font-size:13px;padding:6px 14px;color:#dc2626;border-color:#fca5a5">삭제</button>
        </div>` : `<div class="sub-actions">
          <button class="btn btn-outline btn-del-txn" data-txn-id="${t.id}" style="font-size:13px;padding:6px 14px;color:#dc2626;border-color:#fca5a5">삭제</button>
        </div>`}
      </div></td>`;
    tbody.appendChild(subTr);

    tr.addEventListener('click', () => subTr.classList.toggle('open'));

    const btnLink = subTr.querySelector('.btn-link-order');
    if (btnLink) btnLink.addEventListener('click', (e) => { e.stopPropagation(); openLinkModal(t); });

    subTr.querySelectorAll('.link-del').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        e.stopPropagation();
        if (!confirm('연결을 삭제할까요?')) return;
        await fetch(`${API}/api/txn-links/${btn.dataset.linkId}`, { method: 'DELETE' });
        showToast('연결 삭제됨');
        await load();
        document.getElementById(`sub-tr-${btn.dataset.txnId}`)?.classList.add('open');
      });
    });

    subTr.querySelector('.memo-save-btn').addEventListener('click', async (e) => {
      e.stopPropagation();
      const id = e.target.dataset.txnId;
      const memo = document.getElementById(`memo-${id}`).value;
      await fetch(`${API}/api/transactions/${id}/memo`, {
        method: 'PUT', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ admin_memo: memo })
      });
      showToast('메모 저장됨');
    });

    const btnForceComplete = subTr.querySelector('.btn-force-complete');
    if (btnForceComplete) {
      btnForceComplete.addEventListener('click', async (e) => {
        e.stopPropagation();
        const memo = prompt('완료 처리 사유를 입력하세요 (선택사항):');
        if (memo === null) return;
        await fetch(`${API}/api/transactions/${t.id}/status`, {
          method: 'PUT', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ txn_status: '완료' })
        });
        if (memo) {
          await fetch(`${API}/api/transactions/${t.id}/memo`, {
            method: 'PUT', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ admin_memo: memo })
          });
        }
        showToast('✅ 완료 처리됨');
        await load();
        document.getElementById(`sub-tr-${t.id}`)?.classList.add('open');
      });
    }

    subTr.querySelector('.btn-del-txn').addEventListener('click', async (e) => {
      e.stopPropagation();
      if (!confirm('이 거래 기록을 삭제할까요?')) return;
      await fetch(`${API}/api/transactions/${e.target.dataset.txnId}`, { method: 'DELETE' });
      showToast('삭제됨');
      await load();
    });
  });

  renderTotals(visible);
}

function renderTotals(list) {
  const totalDeposit  = list.reduce((s, t) => s + (t.deposit  || 0), 0);
  const totalWithdraw = list.reduce((s, t) => s + (t.withdraw || 0), 0);
  const existing = document.getElementById('txn-total-row');
  if (existing) existing.remove();
  const tr = document.createElement('tr');
  tr.id = 'txn-total-row';
  tr.className = 'txn-total-row';
  tr.innerHTML = `
    <td colspan="3" style="text-align:right;color:#6b7280">합계 (${list.length}건)</td>
    <td class="txn-amount withdraw" style="font-size:13px">${totalWithdraw ? fmtAmt(totalWithdraw) : '-'}</td>
    <td class="txn-amount deposit"  style="font-size:13px">${totalDeposit  ? fmtAmt(totalDeposit)  : '-'}</td>
    <td colspan="2"></td>`;
  document.getElementById('txn-list').after(tr);
}

// ── 필터 ──────────────────────────────────────────────
document.querySelectorAll('.status-filter button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.status-filter button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    statusFilter = btn.dataset.filter;
    render();
  });
});

// ── 주문 연결 모달 ─────────────────────────────────────
function openLinkModal(txn) {
  currentTxn = txn;
  selectedOrders = {};
  document.getElementById('modal-txn-info').textContent =
    `${txn.memo} · 입금 ${fmtAmt(txn.deposit)} · 미배분 ${fmtAmt(txn.deposit - (txn.linked_amount||0))}`;
  document.getElementById('order-search').value = '';
  document.getElementById('order-result').innerHTML = '';
  document.getElementById('sel-order-list').innerHTML = '';
  document.getElementById('selected-orders').style.display = 'none';
  document.getElementById('btn-zero-adjust').style.display = 'none';
  document.getElementById('remain-info').style.display = 'none';
  document.getElementById('modal-confirm').disabled = true;
  document.getElementById('modal-force-complete').style.display = 'none';
  document.getElementById('modal-bg').style.display = 'flex';
}

function closeModal() {
  document.getElementById('modal-bg').style.display = 'none';
  currentTxn = null;
  selectedOrders = {};
}

document.getElementById('modal-cancel').addEventListener('click', closeModal);
document.getElementById('modal-bg').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-bg')) closeModal();
});

async function searchOrders() {
  const q = document.getElementById('order-search').value.trim();
  if (!q) return;
  const res = await fetch(`${API}/api/orders?name=${encodeURIComponent(q)}&limit=20`);
  const orders = await res.json();
  const result = document.getElementById('order-result');
  if (!orders.length) { result.innerHTML = '<div style="padding:10px;font-size:13px;color:#9ca3af">결과 없음</div>'; return; }
  result.innerHTML = orders.map(o => `
    <div class="order-item" data-id="${o.id}">
      <input type="checkbox" ${selectedOrders[o.id] ? 'checked' : ''}>
      <span class="order-no-label">${o.order_no || '#'+o.id}</span>
      <span class="order-names-wrap">
        <span class="order-name-label">${o.orderer_name || ''}</span>
        ${o.recipient_name ? `<span class="order-recipient-label">› ${o.recipient_name}</span>` : ''}
      </span>
      <span class="order-amt-label">${(o.total_amount||0).toLocaleString()}원</span>
    </div>`).join('');

  result.querySelectorAll('.order-item').forEach(item => {
    item.addEventListener('click', () => {
      const id = +item.dataset.id;
      const chk = item.querySelector('input[type=checkbox]');
      if (selectedOrders[id]) {
        delete selectedOrders[id];
        chk.checked = false;
      } else {
        const orderNo = item.querySelector('.order-no-label').textContent;
        const name = item.querySelector('.order-name-label').textContent;
        const amt = parseInt(item.querySelector('.order-amt-label').textContent.replace(/[^0-9]/g,'')) || 0;
        selectedOrders[id] = { id, order_no: orderNo, orderer_name: name, total_amount: amt, amount: amt };
        chk.checked = true;
      }
      renderSelectedOrders();
    });
  });
}

document.getElementById('btn-order-search').addEventListener('click', searchOrders);
document.getElementById('order-search').addEventListener('keydown', e => { if (e.key === 'Enter') searchOrders(); });

function renderSelectedOrders() {
  const wrap = document.getElementById('selected-orders');
  const list = document.getElementById('sel-order-list');
  const keys = Object.keys(selectedOrders);
  if (!keys.length) {
    wrap.style.display = 'none';
    document.getElementById('btn-zero-adjust').style.display = 'none';
    updateRemain();
    return;
  }
  wrap.style.display = '';
  document.getElementById('btn-zero-adjust').style.display = '';
  list.innerHTML = keys.map(id => {
    const o = selectedOrders[id];
    return `<div class="sel-order-row">
      <span style="font-weight:700;color:#1d4ed8;min-width:100px">${o.order_no}</span>
      <span style="flex:1;color:#6b7280;font-size:12px">${o.orderer_name}</span>
      <input type="number" value="${o.amount}" min="0" data-order-id="${id}" style="width:110px;padding:4px 6px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;text-align:right">원
    </div>`;
  }).join('');
  list.querySelectorAll('input[type=number]').forEach(inp => {
    inp.addEventListener('input', () => {
      selectedOrders[inp.dataset.orderId].amount = parseInt(inp.value) || 0;
      updateRemain();
    });
  });
  updateRemain();
}

function updateRemain() {
  const info = document.getElementById('remain-info');
  const btn = document.getElementById('modal-confirm');
  const btnForce = document.getElementById('modal-force-complete');
  if (!currentTxn) return;
  const unallocated = currentTxn.deposit - (currentTxn.linked_amount || 0);
  const allocating = Object.values(selectedOrders).reduce((s, o) => s + (o.amount || 0), 0);
  const remain = unallocated - allocating;
  if (!Object.keys(selectedOrders).length) {
    info.style.display = 'none';
    btn.disabled = true;
    btnForce.style.display = 'none';
    return;
  }
  info.style.display = '';
  info.className = 'remain-info ' + (remain === 0 ? 'ok' : 'err');
  info.textContent = remain === 0
    ? `✅ 잔액 0원 — 수금완료 처리 가능`
    : `미배분 잔액: ${fmtAmt(remain)}`;
  btn.disabled = remain !== 0;
  btnForce.style.display = remain !== 0 ? '' : 'none';
}

document.getElementById('modal-confirm').addEventListener('click', async () => {
  if (!currentTxn) return;
  const links = Object.values(selectedOrders).map(o => ({ order_id: o.id, amount: o.amount }));
  await fetch(`${API}/api/transactions/${currentTxn.id}/links`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ links })
  });
  for (const o of Object.values(selectedOrders)) {
    await fetch(`${API}/api/orders/${o.id}/status`, {
      method: 'PUT', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: '수금완료' })
    });
  }
  showToast(`✅ ${links.length}건 연결 + 수금완료 처리됨`);
  closeModal();
  await load();
});

// 강제 완료
document.getElementById('modal-force-complete').addEventListener('click', async () => {
  if (!currentTxn) return;
  if (!confirm('잔액이 남아있어도 완료로 처리합니다. 계속할까요?')) return;
  const links = Object.values(selectedOrders).map(o => ({ order_id: o.id, amount: o.amount }));
  if (links.length) {
    await fetch(`${API}/api/transactions/${currentTxn.id}/links`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ links })
    });
  }
  await fetch(`${API}/api/transactions/${currentTxn.id}/status`, {
    method: 'PUT', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ txn_status: '완료' })
  });
  showToast('강제 완료 처리됨');
  closeModal();
  await load();
});

// 기타 처리 (0으로 맞추기)
document.getElementById('btn-zero-adjust').addEventListener('click', async () => {
  if (!currentTxn) return;
  const unallocated = currentTxn.deposit - (currentTxn.linked_amount || 0);
  const allocating = Object.values(selectedOrders).reduce((s, o) => s + (o.amount || 0), 0);
  const remain = unallocated - allocating;
  if (remain === 0) return;
  const memo = prompt(`잔액 ${fmtAmt(remain)}을 기타 처리합니다.\n사유를 입력하세요:`);
  if (memo === null) return;
  const links = Object.values(selectedOrders).map(o => ({ order_id: o.id, amount: o.amount }));
  if (links.length) {
    await fetch(`${API}/api/transactions/${currentTxn.id}/links`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ links })
    });
  }
  await fetch(`${API}/api/transactions/${currentTxn.id}/adjust`, {
    method: 'PUT', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ adjust_amount: remain, adjust_memo: memo })
  });
  showToast('기타 처리됨');
  closeModal();
  await load();
});

document.getElementById('btn-refresh').addEventListener('click', load);
load();
</script>
</body>
</html>
