<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>문자 큐 — bb</title>
<link rel="stylesheet" href="style.css">
<style>
  .wrap { max-width: 900px; }
  .top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }

  .tbl-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { background: #f9fafb; padding: 8px 10px; text-align: left; font-size: 12px;
       color: #6b7280; border-bottom: 1px solid #e5e7eb; white-space: nowrap; }
  td { padding: 9px 10px; border-bottom: 1px solid #f3f4f6; vertical-align: top; }
  tr:hover td { background: #fafbff; }

  .msg-cell { width: 180px; max-width: 180px; font-size: 13px; line-height: 1.5; color: #374151; word-break: break-all; }
  .phone-cell { white-space: nowrap; font-size: 14px; font-weight: 600; color: #374151; width: 130px; }
  .name-cell { white-space: nowrap; font-size: 14px; font-weight: 700; color: #111; width: 100px; }
  .date-cell { white-space: nowrap; font-size: 12px; color: #9ca3af; }
  .action-cell { white-space: nowrap; }

  .btn-sm { padding: 4px 10px; font-size: 12px; border-radius: 6px; border: 1px solid;
             cursor: pointer; font-weight: 600; }
  .btn-edit { background: #fff; border-color: #d1d5db; color: #374151; }
  .btn-edit:hover { background: #f3f4f6; }
  .btn-del  { background: #fff; border-color: #fca5a5; color: #dc2626; }
  .btn-del:hover { background: #fee2e2; }

  /* 모달 */
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 200;
              display: flex; align-items: center; justify-content: center; }
  .modal-box { background: #fff; border-radius: 14px; padding: 28px 24px;
               width: 100%; max-width: 480px; box-shadow: 0 8px 32px rgba(0,0,0,.18); }
  .modal-box h3 { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
  .modal-box label { font-size: 12px; color: #6b7280; font-weight: 600; display: block; margin-bottom: 4px; }
  .modal-box input, .modal-box textarea {
    width: 100%; padding: 8px 10px; border: 1px solid #d1d5db; border-radius: 8px;
    font-size: 13px; font-family: inherit; box-sizing: border-box;
  }
  .modal-box textarea { height: 120px; resize: vertical; }
  .modal-box input:focus, .modal-box textarea:focus { outline: none; border-color: #2563eb; }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; }

  .badge-대기    { background: #fef9c3; color: #854d0e; border: 1px solid #fde047; }
  .badge-발송중  { background: #dcfce7; color: #15803d; border: 1px solid #86efac; }
  .badge-완료    { background: #dbeafe; color: #1d4ed8; border: 1px solid #93c5fd; }
  .badge-실패    { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }

  tr.sms-selected td { background: #eff6ff !important; }
  tr.drag-over td { background: #dbeafe !important; }

  /* 일괄삭제 바 */
  #sms-bulk-bar {
    position: fixed; bottom: 56px; left: 50%; transform: translateX(-50%);
    background: #1e293b; color: #fff; border-radius: 12px;
    padding: 10px 16px; display: flex; align-items: center; gap: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,.3); z-index: 150;
    font-size: 13px; font-weight: 600; white-space: nowrap;
    transition: opacity .2s, transform .2s;
  }
  #sms-bulk-bar.hidden { opacity: 0; pointer-events: none; transform: translateX(-50%) translateY(12px); }
  #sms-bulk-bar .bar-count { color: #93c5fd; }
  #sms-bulk-bar .btn-del-bulk { padding: 6px 14px; border-radius: 8px; border: none;
    background: #dc2626; color: #fff; font-size: 13px; font-weight: 700; cursor: pointer; }
  #sms-bulk-bar .btn-del-bulk:hover { background: #b91c1c; }
  #sms-bulk-bar .btn-cancel { background: none; border: none; color: #64748b; font-size: 18px; cursor: pointer; padding: 0 4px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <h1 style="font-size:20px;font-weight:700">💬 문자 큐</h1>
    <button class="btn btn-outline" id="btn-refresh">↺ 새로고침</button>
  </div>

  <div class="summary">
    <div class="summary-card"><div class="num" id="cnt-대기">-</div><div class="label">대기</div></div>
    <div class="summary-card"><div class="num" id="cnt-발송중">-</div><div class="label">발송중</div></div>
    <div class="summary-card"><div class="num" id="cnt-완료">-</div><div class="label">완료</div></div>
    <div class="summary-card"><div class="num" id="cnt-실패" style="color:#ef4444">-</div><div class="label">실패</div></div>
  </div>

  <div class="filter-row">
    <button class="filter-btn active" data-filter="대기">대기</button>
    <button class="filter-btn" data-filter="발송중">발송중</button>
    <button class="filter-btn" data-filter="완료">완료</button>
    <button class="filter-btn" data-filter="실패">실패</button>
    <button class="filter-btn" data-filter="">전체</button>
  </div>

  <div class="card" style="padding:0;overflow:hidden">
    <div class="tbl-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>상태</th>
            <th>이름</th>
            <th>전화번호</th>
            <th>메시지</th>
            <th>등록일시</th>
            <th>재시도</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="sms-tbody"></tbody>
      </table>
    </div>
  </div>

  <div id="empty-msg" style="display:none" class="empty">해당하는 문자가 없습니다</div>
</div>

<div id="sms-bulk-bar" class="hidden">
  <span class="bar-count" id="sms-bar-count">0건 선택</span>
  <button class="btn-del-bulk" id="btn-sms-bulk-del">🗑 일괄삭제</button>
  <button class="btn-cancel" id="btn-sms-bulk-cancel">✕</button>
</div>

<!-- 수정 모달 -->
<div class="modal-bg" id="modal-bg" style="display:none">
  <div class="modal-box">
    <h3>✏️ 문자 수정</h3>
    <div style="margin-bottom:12px">
      <label>전화번호</label>
      <input type="text" id="modal-phone">
    </div>
    <div style="margin-bottom:4px">
      <label>메시지</label>
      <textarea id="modal-msg"></textarea>
    </div>
    <div class="modal-btns">
      <button class="btn btn-outline" id="modal-cancel">취소</button>
      <button class="btn btn-primary" id="modal-save">저장</button>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script src="common.js"></script>
<script src="nav.js"></script>
<script>
const API = BB_CONFIG.API;
let allItems = [];
let currentFilter = '대기';
let editingId = null;

async function load() {
  const res = await fetch(`${API}/api/sms-queue`);
  allItems = await res.json();
  updateSummary();
  renderTable();
}

function updateSummary() {
  ['대기','발송중','완료','실패'].forEach(s => {
    document.getElementById('cnt-' + s).textContent = allItems.filter(i => i.status === s).length;
  });
}

function getFiltered() {
  if (!currentFilter) return allItems;
  return allItems.filter(i => i.status === currentFilter);
}

function renderTable() {
  const filtered = getFiltered();
  const tbody = document.getElementById('sms-tbody');
  const empty = document.getElementById('empty-msg');

  if (!filtered.length) {
    tbody.innerHTML = '';
    empty.style.display = '';
    return;
  }
  empty.style.display = 'none';
  tbody.innerHTML = '';

  filtered.forEach(item => {
    const tr = document.createElement('tr');
    tr.dataset.id = item.id;
    tr.innerHTML = `
      <td style="color:#9ca3af">${item.id}</td>
      <td><span class="badge badge-${item.status}">${item.status}</span></td>
      <td class="name-cell">${item.customer_name || '-'}</td>
      <td class="phone-cell">${item.phone}</td>
      <td class="msg-cell">${item.message}</td>
      <td class="date-cell">${(item.created_at || '').slice(0, 16)}</td>
      <td style="font-size:12px;color:#9ca3af;text-align:center">${item.retry_count}</td>
      <td class="action-cell">
        <button class="btn-sm btn-edit" data-id="${item.id}">수정</button>
        <button class="btn-sm btn-del"  data-id="${item.id}" style="margin-left:4px">삭제</button>
      </td>`;

    tr.querySelector('.btn-edit').addEventListener('click', () => openModal(item));
    tr.querySelector('.btn-del').addEventListener('click', () => deleteItem(item.id));
    tbody.appendChild(tr);
  });
}

// ── 수정 모달 ─────────────────────────────────────────
function openModal(item) {
  editingId = item.id;
  document.getElementById('modal-phone').value = item.phone;
  document.getElementById('modal-msg').value   = item.message;
  document.getElementById('modal-bg').style.display = 'flex';
}

function closeModal() {
  editingId = null;
  document.getElementById('modal-bg').style.display = 'none';
}

document.getElementById('modal-cancel').addEventListener('click', closeModal);
document.getElementById('modal-bg').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-bg')) closeModal();
});

document.getElementById('modal-save').addEventListener('click', async () => {
  const phone   = document.getElementById('modal-phone').value.trim();
  const message = document.getElementById('modal-msg').value.trim();
  if (!phone || !message) { showToast('전화번호와 메시지를 입력하세요'); return; }

  await fetch(`${API}/api/sms-queue/${editingId}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ phone, message })
  });
  showToast('✅ 수정됨');
  closeModal();
  await load();
});

// ── 삭제 ──────────────────────────────────────────────
async function deleteItem(id) {
  if (!confirm('이 문자를 삭제할까요?')) return;
  await fetch(`${API}/api/sms-queue/${id}`, { method: 'DELETE' });
  showToast('삭제됨');
  await load();
}

// ── 필터 ──────────────────────────────────────────────
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderTable();
  });
});

document.getElementById('btn-refresh').addEventListener('click', load);

// ── 드래그 선택 ───────────────────────────────────────
let dragStartIdx = null;
let isDragging = false;
let selectedIds = new Set();

function getRows() { return [...document.querySelectorAll('#sms-tbody tr')]; }

function applySelection() {
  getRows().forEach(tr => {
    const id = +tr.dataset.id;
    tr.classList.toggle('sms-selected', selectedIds.has(id));
  });
  const bar = document.getElementById('sms-bulk-bar');
  if (selectedIds.size) {
    bar.classList.remove('hidden');
    document.getElementById('sms-bar-count').textContent = `${selectedIds.size}건 선택`;
  } else {
    bar.classList.add('hidden');
  }
}

function clearSelection() {
  selectedIds.clear();
  applySelection();
}

document.getElementById('sms-tbody').addEventListener('mousedown', e => {
  const tr = e.target.closest('tr');
  if (!tr || e.target.closest('button')) return;
  isDragging = true;
  dragStartIdx = getRows().indexOf(tr);
  // 클릭만이면 토글
  const id = +tr.dataset.id;
  if (selectedIds.has(id)) selectedIds.delete(id);
  else selectedIds.add(id);
  applySelection();
  e.preventDefault();
});

document.getElementById('sms-tbody').addEventListener('mouseover', e => {
  if (!isDragging) return;
  const tr = e.target.closest('tr');
  if (!tr) return;
  const rows = getRows();
  const endIdx = rows.indexOf(tr);
  const [from, to] = dragStartIdx <= endIdx ? [dragStartIdx, endIdx] : [endIdx, dragStartIdx];
  rows.forEach((row, i) => {
    const id = +row.dataset.id;
    if (i >= from && i <= to) selectedIds.add(id);
  });
  applySelection();
});

document.addEventListener('mouseup', () => { isDragging = false; });

document.getElementById('btn-sms-bulk-del').addEventListener('click', async () => {
  if (!selectedIds.size) return;
  if (!confirm(`${selectedIds.size}건을 삭제할까요?`)) return;
  const btn = document.getElementById('btn-sms-bulk-del');
  btn.disabled = true;
  for (const id of selectedIds) {
    await fetch(`${API}/api/sms-queue/${id}`, { method: 'DELETE' });
  }
  showToast(`🗑 ${selectedIds.size}건 삭제됨`);
  clearSelection();
  await load();
  btn.disabled = false;
});

document.getElementById('btn-sms-bulk-cancel').addEventListener('click', clearSelection);

load();
</script>
</body>
</html>
